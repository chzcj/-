<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>画像 mock A · 精致卡片网格</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <link rel="stylesheet" href="../../components.css" />
  <link rel="stylesheet" href="shared-profile-mock.css" />
  <style>.variant-badge{position:fixed;top:12px;right:12px;z-index:9;padding:6px 12px;border-radius:999px;background:rgba(32,38,51,.82);color:#fff;font:var(--type-caption)}</style>
</head>
<body>
  <a class="variant-badge" href="index.html">← 选版</a>
  <div class="phone-stage">
    <div class="phone-frame">
      <div class="phone-inner">
        <div class="status-bar"><span>9:41</span><span>育见 mock A</span></div>
        <div class="phone-screen">
          <div class="screen-top">
            <p class="profile-hero-kicker">画像 · 精致网格</p>
            <h1 class="screen-heading">认识小宇</h1>
            <p class="screen-meta"><span class="profile-refresh"><span class="profile-refresh-dot"></span>上次整理 · 今天 14:32</span></p>
          </div>
          <div class="screen-scroll">
            <div class="hub-grid">
              <button type="button" class="hub-card">
                <div class="hub-card__head"><h2 class="hub-card__title">动态成长画像</h2><span class="hub-card__chev">▸</span></div>
                <p class="hub-card__body">他不是「懒」，更像在作业开始前就已经感到会被检查、被加码——于是先用拖延把那一刀往后推。</p>
                <div class="hub-card__foot"><span class="hub-card__state">较完整</span><span class="hub-card__hint">持续交流会继续精修</span></div>
              </button>
              <button type="button" class="hub-card">
                <div class="hub-card__head"><h2 class="hub-card__title">当前关注点</h2><span class="hub-card__chev">▸</span></div>
                <p class="hub-card__body">晚饭后催作业时，孩子关门、短句顶嘴——你更想搞懂的是：他是在躲检查，还是在躲你的失望。</p>
                <div class="hub-card__foot"><span class="hub-card__state">已整理</span></div>
              </button>
              <button type="button" class="hub-card">
                <div class="hub-card__head"><h2 class="hub-card__title">亲子互动关系</h2><span class="hub-card__chev">▸</span></div>
                <p class="hub-card__body">一催就顶、顶完就沉默；你这边越想把事说清楚，他那边越先把门关上。</p>
                <div class="hub-card__foot"><span class="hub-card__state">已整理</span></div>
              </button>
              <button type="button" class="hub-card">
                <div class="hub-card__head"><h2 class="hub-card__title">有效策略</h2><span class="hub-card__chev">▸</span></div>
                <p class="hub-card__body">作业开始前先问「今天最难的是哪一题」，比直接催「快点写」更容易让他开口。</p>
                <div class="hub-card__foot"><span class="hub-card__state">待验证</span><span class="hub-card__hint">来自任务反馈</span></div>
              </button>
              <button type="button" class="hub-card">
                <div class="hub-card__head"><h2 class="hub-card__title">成长阻力</h2><span class="hub-card__chev">▸</span></div>
                <p class="hub-card__body">催与躲：催促升高时，孩子用关门切断接触，家里进入「各做各的」冷却期。</p>
                <div class="hub-card__foot"><span class="hub-card__state hub-card__state--warm">值得先看</span></div>
              </button>
            </div>
            <p class="section-label">最近变化</p>
            <article class="pcard pcard--tip" style="width:100%;max-width:none">
              <div class="pcard__inner">
                <p class="pcard__tip-text">这周有两次提到「做完还被加码」——模式在重复，不是偶发脾气。</p>
              </div>
            </article>
          </div>
        </div>
        <div class="footer-area">
          <div class="nav-wrap">
            <nav class="nav nav--airy" aria-label="底部导航">
              <a class="tab" href="#"><img class="tab__icon" src="https://unpkg.com/lucide-static@latest/icons/messages-square.svg" width="24" height="24" alt=""><span class="tab__label">交流</span></a>
              <a class="tab" href="#"><img class="tab__icon" src="https://unpkg.com/lucide-static@latest/icons/list-todo.svg" width="24" height="24" alt=""><span class="tab__label">任务</span></a>
              <a class="tab" href="#"><img class="tab__icon" src="https://unpkg.com/lucide-static@latest/icons/sparkles.svg" width="24" height="24" alt=""><span class="tab__label">预演</span></a>
              <a class="tab is-active" href="#" aria-current="page"><img class="tab__icon" src="https://unpkg.com/lucide-static@latest/icons/user-round.svg" width="24" height="24" alt=""><span class="tab__label">画像</span></a>
            </nav>
          </div>
          <div class="home-indicator" aria-hidden="true"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
