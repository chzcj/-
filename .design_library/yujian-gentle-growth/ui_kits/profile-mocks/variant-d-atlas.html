<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>画像 mock D · 主题地图</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <link rel="stylesheet" href="../../components.css" />
  <link rel="stylesheet" href="shared-profile-mock.css" />
  <style>.variant-badge{position:fixed;top:12px;right:12px;z-index:9;padding:6px 12px;border-radius:999px;background:rgba(32,38,51,.82);color:#fff;font:var(--type-caption)}</style>
</head>
<body>
  <a class="variant-badge" href="index.html">← 选版</a>
  <div class="phone-stage">
    <div class="phone-frame">
      <div class="phone-inner">
        <div class="status-bar"><span>9:41</span><span>育见 mock D</span></div>
        <div class="phone-screen">
          <div class="screen-top">
            <p class="profile-hero-kicker">画像 · 主题地图</p>
            <h1 class="screen-heading">小宇的理解地图</h1>
            <p class="screen-meta">点主题切换 · 今天 14:32</p>
          </div>
          <div class="screen-scroll">
            <div class="topic-rail" role="tablist" aria-label="画像主题">
              <button type="button" class="topic-chip is-active" data-topic="core" role="tab" aria-selected="true">核心</button>
              <button type="button" class="topic-chip" data-topic="focus" role="tab">关注点</button>
              <button type="button" class="topic-chip" data-topic="interaction" role="tab">互动</button>
              <button type="button" class="topic-chip" data-topic="strategy" role="tab">策略</button>
              <button type="button" class="topic-chip" data-topic="tension" role="tab">张力</button>
              <button type="button" class="topic-chip" data-topic="homework" role="tab">作业</button>
            </div>

            <div id="topic-panel" data-topic="core">
              <article class="insight insight--authority" style="animation:none">
                <div class="insight__rail"><span class="insight__eyebrow"><span class="insight__trace"></span>核心</span></div>
                <h2 class="insight__title">怕的不是作业，是作业后面的检查</h2>
                <div class="insight__body">
                  <p>拖延在这里更像缓冲——把「会不会又被加码」往后推。</p>
                  <div class="insight__quiet"><p>动态成长画像 · 较完整 · 持续交流会继续精修。</p></div>
                </div>
              </article>
            </div>

            <p class="section-label">其他模块 · 轻触展开</p>
            <a class="link-row" href="#" data-jump="focus"><div><div class="link-row__title">当前关注点</div><div class="link-row__sub">催作业 · 关门 · 顶嘴</div></div><span class="link-row__chev">▸</span></a>
            <a class="link-row" href="#" data-jump="interaction"><div><div class="link-row__title">亲子互动</div><div class="link-row__sub">一催就顶 · 顶完就沉默</div></div><span class="link-row__chev">▸</span></a>
            <a class="link-row" href="#" data-jump="strategy"><div><div class="link-row__title">有效策略</div><div class="link-row__sub">先问最难的一题</div></div><span class="link-row__chev">▸</span></a>
          </div>
        </div>
        <div class="footer-area">
          <div class="nav-wrap">
            <nav class="nav nav--airy" aria-label="底部导航">
              <a class="tab" href="#"><img class="tab__icon" src="https://unpkg.com/lucide-static@latest/icons/messages-square.svg" width="24" height="24" alt=""><span class="tab__label">交流</span></a>
              <a class="tab" href="#"><img class="tab__icon" src="https://unpkg.com/lucide-static@latest/icons/list-todo.svg" width="24" height="24" alt=""><span class="tab__label">任务</span></a>
              <a class="tab" href="#"><img class="tab__icon" src="https://unpkg.com/lucide-static@latest/icons/sparkles.svg" width="24" height="24" alt=""><span class="tab__label">预演</span></a>
              <a class="tab is-active" href="#" aria-current="page"><img class="tab__icon" src="https://unpkg.com/lucide-static@latest/icons/user-round.svg" width="24" height="24" alt=""><span class="tab__label">画像</span></a>
            </nav>
          </div>
          <div class="home-indicator"></div>
        </div>
      </div>
    </div>
  </div>
  <script>
    const TOPICS = {
      core: {
        eyebrow: '核心',
        title: '怕的不是作业，是作业后面的检查',
        body: '拖延在这里更像缓冲——把「会不会又被加码」往后推。',
        quiet: '动态成长画像 · 较完整 · 持续交流会继续精修。',
        variant: 'insight--authority'
      },
      focus: {
        eyebrow: '当前关注',
        title: '晚饭后催作业：关门前的顶嘴',
        body: '你想区分的是：他在躲检查，还是在躲你的失望。',
        quiet: '来自最近三轮交流整理。',
        variant: 'insight--authority'
      },
      interaction: {
        eyebrow: '互动模式',
        title: '一催就顶，顶完就沉默',
        body: '你越想把事说清楚，他越先把接触切断。',
        quiet: '多轮交流后会越来越清晰。',
        variant: 'insight--authority'
      },
      strategy: {
        eyebrow: '有效策略',
        title: '开始前先问「今天最难的是哪一题」',
        body: '比直接催「快点写」更容易开口。',
        quiet: '来自任务反馈 · 待继续验证。',
        variant: ''
      },
      tension: {
        eyebrow: '结构张力',
        title: '催与躲：催促升高，接触就断',
        body: '做完还被加码，会让「开始」变成高风险。',
        quiet: '这不是评判，而是帮你看清重复的模式。',
        variant: 'insight--tension'
      },
      homework: {
        eyebrow: '写作业机制',
        title: '启动前沉默 · 检查段回避',
        body: '待确认 1 条假设 · 继续交流会修正。',
        quiet: '机制与可试做法会列在这里。',
        variant: ''
      }
    };

    const panel = document.getElementById('topic-panel');
    const chips = document.querySelectorAll('.topic-chip');

    function renderTopic(key) {
      const t = TOPICS[key];
      if (!t) return;
      panel.dataset.topic = key;
      panel.innerHTML = `
        <article class="insight ${t.variant}" style="animation:none">
          <div class="insight__rail"><span class="insight__eyebrow"><span class="insight__trace"></span>${t.eyebrow}</span></div>
          <h2 class="insight__title">${t.title}</h2>
          <div class="insight__body">
            <p>${t.body}</p>
            <div class="insight__quiet"><p>${t.quiet}</p></div>
          </div>
        </article>`;
    }

    chips.forEach((chip) => {
      chip.addEventListener('click', () => {
        chips.forEach((c) => { c.classList.remove('is-active'); c.setAttribute('aria-selected', 'false'); });
        chip.classList.add('is-active');
        chip.setAttribute('aria-selected', 'true');
        renderTopic(chip.dataset.topic);
      });
    });

    document.querySelectorAll('[data-jump]').forEach((row) => {
      row.addEventListener('click', (e) => {
        e.preventDefault();
        const key = row.dataset.jump;
        chips.forEach((c) => {
          const on = c.dataset.topic === key;
          c.classList.toggle('is-active', on);
          c.setAttribute('aria-selected', on ? 'true' : 'false');
        });
        renderTopic(key);
        panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      });
    });
  </script>
</body>
</html>
