<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>预演 L3-C · 编辑型简报</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <link rel="stylesheet" href="../../components.css" />
  <link rel="stylesheet" href="../profile-mocks/shared-profile-mock.css" />
  <link rel="stylesheet" href="shared-rehearsal-mock.css" />
</head>
<body>
  <a class="variant-badge" href="index.html">← 选版</a>
  <div class="phone-stage">
    <div class="phone-frame">
      <div class="phone-inner">
        <div class="status-bar"><span>9:41</span><span>L3-C 简报</span></div>
        <div class="phone-screen">
          <header class="deep-header">
            <button type="button" class="deep-header__btn" aria-label="返回">
              <img src="https://unpkg.com/lucide-static@latest/icons/arrow-left.svg" width="18" height="18" alt="">
            </button>
            <h1 class="deep-header__title">对话分析</h1>
            <button type="button" class="deep-header__btn" aria-label="关闭">
              <img src="https://unpkg.com/lucide-static@latest/icons/x.svg" width="18" height="18" alt="">
            </button>
          </header>
          <div class="result-scroll">
            <header class="editorial-hero">
              <p class="overview-kicker">今晚这段对话</p>
              <h2>他不是不想写，<br>更像在躲「被盯着写」</h2>
              <p>你这边越想把进度说清楚，他越先用短句把门关上。冲突不是从作业开始的，是从检查感开始的。</p>
            </header>
            <a class="link-row" href="#">
              <div>
                <div class="link-row__title">今晚可试的一句话</div>
                <div class="link-row__sub">「今天最难的是哪一题？」——比催「快点写」更容易开口</div>
              </div>
              <span class="link-row__chev">▸</span>
            </a>
            <a class="link-row" href="#">
              <div>
                <div class="link-row__title">示范对话</div>
                <div class="link-row__sub">先看一版更轻的开口方式</div>
              </div>
              <span class="link-row__chev">▸</span>
            </a>
            <a class="link-row" href="#">
              <div>
                <div class="link-row__title">对话原文 · 4 段</div>
                <div class="link-row__sub">2 处高亮 · 可切换说话人</div>
              </div>
              <span class="link-row__chev">▸</span>
            </a>
            <div class="result-actions" style="margin-top:var(--space-4)">
              <button type="button" class="mock-cta">用这次对话去情景预演</button>
              <button type="button" class="mock-cta mock-cta--secondary">返回预演</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
