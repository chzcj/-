<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>预演 L1-D · 预演进行中</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <link rel="stylesheet" href="../../components.css" />
  <link rel="stylesheet" href="../profile-mocks/shared-profile-mock.css" />
  <link rel="stylesheet" href="shared-rehearsal-mock.css" />
  <style>.phone-screen { overflow: hidden; }</style>
</head>
<body>
  <a class="variant-badge" href="index.html">← 选版</a>
  <div class="phone-stage">
    <div class="phone-frame">
      <div class="phone-inner">
        <div class="status-bar"><span>9:41</span><span>L1-D 进行中</span></div>
        <div class="phone-screen">
          <div class="screen-top" style="padding-bottom:8px">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
              <h1 class="screen-heading" style="font:var(--type-h4)">写作业前怎么开口</h1>
              <span class="status-pill">防御偏高</span>
            </div>
          </div>
          <div class="sim-feed">
            <article class="secondme-card">
              <p class="secondme-card__child">「你别催我行不行，我又不是不写。」</p>
              <p class="secondme-card__hint-title">他可能是这样听到的</p>
              <p class="secondme-card__hint">他现在不一定是在认真回答「什么时候写」，更像是在把你推开。对他来说，「你催我」可能意味着后面又要开始被盯、被改、被评价。</p>
            </article>
            <div class="sim-bubble-row is-parent">
              <div class="sim-bubble">那你想几点开始？我们定个时间。</div>
            </div>
            <article class="secondme-card">
              <p class="secondme-card__child">「定了也没用，反正你都要管。」</p>
              <p class="secondme-card__hint-title">他可能是这样听到的</p>
              <p class="secondme-card__hint">「定时间」在他听来可能还是你在安排、在控制节奏，而不是把主动权还给他。</p>
              <p class="secondme-card__suggest"><strong>您可以这样说</strong> · 今晚你先选要做哪一科，我十分钟后过来，不问进度。</p>
            </article>
          </div>
          <div class="input-dock">
            <div class="input-dock__fake">输入你想练的开场白…</div>
          </div>
        </div>
        <div class="footer-area">
          <div class="nav-wrap">
            <nav class="nav nav--airy" aria-label="底部导航">
              <a class="tab" href="#"><img class="tab__icon" src="https://unpkg.com/lucide-static@latest/icons/messages-square.svg" width="24" height="24" alt=""><span class="tab__label">交流</span></a>
              <a class="tab" href="#"><img class="tab__icon" src="https://unpkg.com/lucide-static@latest/icons/list-todo.svg" width="24" height="24" alt=""><span class="tab__label">任务</span></a>
              <a class="tab is-active" href="#" aria-current="page"><img class="tab__icon" src="https://unpkg.com/lucide-static@latest/icons/sparkles.svg" width="24" height="24" alt=""><span class="tab__label">预演</span></a>
              <a class="tab" href="#"><img class="tab__icon" src="https://unpkg.com/lucide-static@latest/icons/user-round.svg" width="24" height="24" alt=""><span class="tab__label">画像</span></a>
            </nav>
          </div>
          <div class="home-indicator" aria-hidden="true"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
