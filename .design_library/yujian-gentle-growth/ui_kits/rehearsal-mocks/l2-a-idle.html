<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>预演 L2-A · 待录音</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <link rel="stylesheet" href="../../components.css" />
  <link rel="stylesheet" href="../profile-mocks/shared-profile-mock.css" />
  <link rel="stylesheet" href="shared-rehearsal-mock.css" />
</head>
<body>
  <a class="variant-badge" href="index.html">← 选版</a>
  <div class="phone-stage">
    <div class="phone-frame">
      <div class="phone-inner">
        <div class="status-bar"><span>9:41</span><span>L2-A 待录音</span></div>
        <div class="phone-screen">
          <header class="deep-header">
            <button type="button" class="deep-header__btn" aria-label="返回">
              <img src="https://unpkg.com/lucide-static@latest/icons/x.svg" width="18" height="18" alt="">
            </button>
            <h1 class="deep-header__title">亲子对话录音</h1>
            <button type="button" class="deep-header__btn" aria-label="关闭">
              <img src="https://unpkg.com/lucide-static@latest/icons/x.svg" width="18" height="18" alt="">
            </button>
          </header>
          <div class="record-body">
            <p class="record-lead">录完整段对话后再转文字并分析。录音中不会出现实时字幕。</p>
            <div class="wave-card">
              <span class="record-timer is-idle">0:00</span>
              <p class="record-hint">点下方按钮开始录音</p>
            </div>
            <button type="button" class="record-main-btn">开始录音</button>
            <span class="record-skip">暂不录音，返回预演</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
