<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>预演 L1-E · 预演结束</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <link rel="stylesheet" href="../../components.css" />
  <link rel="stylesheet" href="../profile-mocks/shared-profile-mock.css" />
  <link rel="stylesheet" href="shared-rehearsal-mock.css" />
</head>
<body>
  <a class="variant-badge" href="index.html">← 选版</a>
  <div class="phone-stage">
    <div class="phone-frame">
      <div class="phone-inner">
        <div class="status-bar"><span>9:41</span><span>L1-E 结束</span></div>
        <div class="phone-screen">
          <div class="screen-top">
            <p class="profile-hero-kicker">预演完成</p>
            <h1 class="screen-heading">这次预演里，我看到的重点</h1>
          </div>
          <div class="screen-scroll">
            <article class="pcard pcard--insight" style="width:100%;max-width:none">
              <div class="pcard__inner">
                <p class="pcard__insight-title">预演总结</p>
                <p class="pcard__insight-body">先减少「被站在旁边看着」的感觉，再谈开始。你越想把时间说清楚，他越先听到的是「你又要管我」。</p>
              </div>
            </article>
            <div class="profile-block">
              <h3>孩子最容易被触发的是</h3>
              <p>当你解释「我是怕你拖到很晚」，或者说「你每次都拖」时，孩子容易听成：你还是在盯他、评价他。</p>
            </div>
            <div class="profile-block">
              <h3>今晚可以试的说法</h3>
              <p>今晚如果又卡在作业开始前，可以先让孩子自己选第一项，你暂时离开十分钟。</p>
            </div>
            <div class="profile-block">
              <h3>还不能直接进入档案的内容</h3>
              <p>预演里的孩子反应只是模拟，不等于真实证据。只有你今晚真的试了，并反馈孩子实际怎么反应，才会更新档案。</p>
            </div>
            <div class="end-actions">
              <button type="button" class="mock-cta mock-cta--secondary">保存这个方向</button>
              <button type="button" class="mock-cta">今晚试一次</button>
              <button type="button" class="mock-cta mock-cta--secondary">重新练一遍</button>
            </div>
          </div>
        </div>
        <div class="footer-area">
          <div class="nav-wrap">
            <nav class="nav nav--airy" aria-label="底部导航">
              <a class="tab" href="#"><img class="tab__icon" src="https://unpkg.com/lucide-static@latest/icons/messages-square.svg" width="24" height="24" alt=""><span class="tab__label">交流</span></a>
              <a class="tab" href="#"><img class="tab__icon" src="https://unpkg.com/lucide-static@latest/icons/list-todo.svg" width="24" height="24" alt=""><span class="tab__label">任务</span></a>
              <a class="tab is-active" href="#" aria-current="page"><img class="tab__icon" src="https://unpkg.com/lucide-static@latest/icons/sparkles.svg" width="24" height="24" alt=""><span class="tab__label">预演</span></a>
              <a class="tab" href="#"><img class="tab__icon" src="https://unpkg.com/lucide-static@latest/icons/user-round.svg" width="24" height="24" alt=""><span class="tab__label">画像</span></a>
            </nav>
          </div>
          <div class="home-indicator" aria-hidden="true"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
