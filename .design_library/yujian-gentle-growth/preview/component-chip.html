<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chip</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:12px;background:var(--color-surface);font-family:var(--font-family-base);color:var(--color-on-surface);box-sizing:border-box}
*,*::before,*::after{box-sizing:inherit}
.row{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.label{font-size:10px;color:var(--color-muted-foreground);min-width:80px;max-width:100px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.divider{border:none;border-top:1px solid var(--color-border);margin:4px 0 10px}
.scene{display:flex;align-items:center;min-height:56px;padding:0 var(--space-3);border-radius:var(--radius-lg);background:var(--color-surface-container-low);border:1px solid var(--color-outline);box-shadow:var(--shadow-1);flex-shrink:0}
.chip{display:inline-flex;align-items:center;gap:6px;min-height:36px;padding:0 14px;border-radius:var(--radius-full);font:var(--type-caption);white-space:nowrap;flex-shrink:0;border:1px solid transparent;transition:background var(--motion-duration-fast) var(--motion-ease-standard),border-color var(--motion-duration-fast) var(--motion-ease-standard),box-shadow var(--motion-duration-fast) var(--motion-ease-standard),transform var(--motion-duration-fast) var(--motion-ease-standard)}
.chip:hover{transform:translateY(-1px)}
.chip:focus-visible{outline:none;box-shadow:0 0 0 2px var(--color-surface),0 0 0 4px var(--interactive-focus)}
.chip:active{transform:scale(var(--motion-press-scale))}
.chip--soft{background:linear-gradient(180deg,var(--color-surface) 0%,var(--color-primary-container) 100%);color:var(--color-on-primary-container);border-color:var(--color-outline);box-shadow:0 0 0 1px var(--color-glass-stroke) inset,0 10px 22px -20px var(--color-glow-strong)}
.chip--status{background:linear-gradient(180deg,var(--color-surface) 0%,var(--color-success-container) 100%);color:var(--color-success);border-color:var(--color-outline);box-shadow:0 0 0 1px var(--color-glass-stroke) inset,0 10px 22px -20px var(--color-glow-strong)}
.chip--outline{background:var(--color-surface);color:var(--color-primary);border-color:var(--color-border);box-shadow:0 0 0 1px var(--color-outline) inset}
.chip__dot{width:8px;height:8px;border-radius:var(--radius-full);background:var(--color-success);box-shadow:0 0 0 3px var(--color-success-container);flex-shrink:0}
@media (prefers-reduced-motion: reduce){.chip{transition:none}.chip:hover,.chip:active{transform:none}}
</style>
</head>
<body>
  <div class="row">
    <span class="label">开始前说明</span>
    <div class="scene"><span class="chip chip--soft">开始前说明</span></div>
  </div>
  <hr class="divider">
  <div class="row">
    <span class="label">已记住</span>
    <div class="scene"><span class="chip chip--status"><span class="chip__dot"></span>已记住</span></div>
  </div>
  <hr class="divider">
  <div class="row">
    <span class="label">交流</span>
    <div class="scene"><span class="chip chip--outline">交流</span></div>
  </div>
</body>
</html>
