<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input Dock</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:12px;background:var(--color-background);font-family:var(--font-family-base);color:var(--color-on-surface)}
.row{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
.label{width:72px;flex-shrink:0;padding-top:14px;font:var(--type-caption);color:var(--color-muted-foreground)}
.divider{border:none;border-top:1px solid var(--color-border);margin:0 0 12px}
.dock{width:min(100%,322px);flex-shrink:0;position:relative;overflow:hidden;border:1px solid var(--color-outline-variant);border-radius:22px;padding:var(--space-3);background:linear-gradient(180deg,rgba(255,255,255,.88) 0%,var(--color-surface-container-low) 100%);box-shadow:var(--shadow-2)}
.dock::before{content:"";position:absolute;inset:auto -40px -34px auto;width:136px;height:136px;border-radius:var(--radius-full);background:radial-gradient(circle,var(--color-glow-soft) 0%,transparent 72%);opacity:.84}
.dock::after{content:"";position:absolute;inset:1px;border-radius:inherit;border:1px solid rgba(255,255,255,.58);pointer-events:none}
.dock-top{position:relative;display:flex;align-items:center;justify-content:space-between;gap:var(--space-2);margin-bottom:var(--space-3);z-index:1}
.scene-chip,.mode-chip,.status-banner,.transcript-panel,.text-field{position:relative;z-index:1}
.scene-chip{display:inline-flex;align-items:center;min-height:30px;padding:0 12px;border-radius:var(--radius-full);background:var(--color-primary-container);color:var(--color-on-primary-container);font:var(--type-caption)}
.mode-chip{display:inline-flex;align-items:center;min-height:30px;padding:0 12px;border-radius:var(--radius-full);background:rgba(255,255,255,.72);color:var(--color-muted-foreground);font:var(--type-caption);box-shadow:inset 0 0 0 1px rgba(93,108,77,.10)}
.voice-stack{position:relative;z-index:1;display:flex;flex-direction:column;gap:10px}
.hold-button,.send-button{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:default;flex-shrink:0;transition:transform var(--motion-duration-base) var(--motion-ease-emphasized),background var(--motion-duration-base) var(--motion-ease-emphasized),box-shadow var(--motion-duration-base) var(--motion-ease-emphasized)}
.hold-button{width:100%;min-height:56px;padding:0 18px;border-radius:var(--radius-full);background:linear-gradient(180deg,var(--yujian-primary-500) 0%,var(--color-primary) 100%);color:var(--color-on-primary);font:var(--type-body);font-weight:620;box-shadow:inset 0 1px 0 rgba(255,255,255,.32),0 10px 20px -14px rgba(111,159,86,.32),var(--shadow-1)}
.hold-button:hover{transform:translateY(-1px);box-shadow:inset 0 1px 0 rgba(255,255,255,.38),0 12px 22px -14px rgba(111,159,86,.28),var(--shadow-2)}
.hold-button:active{transform:scale(var(--motion-press-scale))}
.button-dot{width:10px;height:10px;border-radius:var(--radius-full);background:var(--color-on-primary);opacity:.86;flex-shrink:0}
.meta-line{display:flex;align-items:center;justify-content:space-between;gap:var(--space-2);font:var(--type-caption);color:var(--color-muted-foreground)}
.text-field{display:flex;align-items:center;gap:10px;min-height:56px;padding:4px 4px 4px 12px;border-radius:var(--radius-full);background:rgba(255,255,255,.72);box-shadow:inset 0 0 0 1px rgba(93,108,77,.10)}
.text-copy{flex:1;font:var(--type-body);color:var(--color-on-surface)}
.send-button{min-width:68px;min-height:48px;padding:0 16px;border-radius:var(--radius-full);background:var(--color-primary-container);color:var(--color-primary);font:var(--type-caption);font-weight:620;box-shadow:inset 0 1px 0 rgba(255,255,255,.34)}
.send-button:hover{transform:translateY(-1px);background:var(--color-surface)}
.send-button:active{transform:scale(var(--motion-press-scale))}
.dock.recording{box-shadow:0 0 0 1px rgba(157,204,117,.10),var(--shadow-2)}
.dock.recording::before{width:168px;height:168px;inset:auto -28px -42px auto;background:radial-gradient(circle,var(--color-glow-strong) 0%,transparent 72%)}
.status-banner{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:10px 12px;border-radius:18px;background:linear-gradient(180deg,var(--color-primary-container) 0%,rgba(255,255,255,.76) 100%);border:1px solid rgba(255,255,255,.56)}
.pulse-dot{width:8px;height:8px;border-radius:var(--radius-full);background:var(--color-primary);flex-shrink:0;animation:pulse 1.8s ease-out infinite}
.status-text{display:flex;flex-direction:column;gap:2px}
.status-title{font:var(--type-caption);color:var(--color-primary);font-weight:620}
.status-copy{font:var(--type-caption);color:var(--color-muted-foreground)}
.recording-body{position:relative;z-index:1;display:flex;align-items:stretch;gap:10px}
.hold-button.is-live{width:128px;min-width:128px;animation:breathe 1.8s ease-in-out infinite;box-shadow:0 0 0 4px rgba(157,204,117,.10),var(--shadow-2)}
.transcript-panel{flex:1;display:flex;align-items:center;min-height:56px;padding:0 14px;border-radius:18px;background:rgba(255,255,255,.78);font:var(--type-body);color:var(--color-on-surface);box-shadow:inset 0 0 0 1px rgba(93,108,77,.10)}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(157,204,117,.18)}70%{box-shadow:0 0 0 10px transparent}100%{box-shadow:0 0 0 0 transparent}}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.018)}}
@media (prefers-reduced-motion:reduce){.hold-button,.send-button,.pulse-dot,.hold-button.is-live{transition:none;animation:none}}
</style>
</head>
<body>
<div class="row">
  <span class="label">语音模式</span>
  <div class="dock">
    <div class="dock-top">
      <span class="scene-chip">先说晚饭</span>
      <span class="mode-chip">语音</span>
    </div>
    <div class="voice-stack">
      <button class="hold-button" type="button"><span class="button-dot"></span><span>按住说话</span></button>
      <div class="meta-line"><span>语音优先</span><span>统一浮板</span></div>
    </div>
  </div>
</div>
<hr class="divider">
<div class="row">
  <span class="label">文字模式</span>
  <div class="dock">
    <div class="dock-top">
      <span class="scene-chip">先说晚饭</span>
      <span class="mode-chip">文字</span>
    </div>
    <div class="text-field">
      <div class="text-copy">先说晚饭</div>
      <button class="send-button" type="button">发送</button>
    </div>
  </div>
</div>
<hr class="divider">
<div class="row">
  <span class="label">录音中</span>
  <div class="dock recording">
    <div class="status-banner">
      <span class="pulse-dot"></span>
      <div class="status-text">
        <span class="status-title">正在记录</span>
        <span class="status-copy">松手发送，上滑取消</span>
      </div>
    </div>
    <div class="recording-body">
      <button class="hold-button is-live" type="button"><span class="button-dot"></span><span>按住说话</span></button>
      <div class="transcript-panel">先说晚饭</div>
    </div>
  </div>
</div>
</body>
</html>
