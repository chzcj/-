<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Button</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:12px;background:var(--color-surface);color:var(--color-on-surface);font:var(--type-body);}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px;}
.label{min-width:72px;max-width:90px;flex-shrink:0;color:var(--color-muted-foreground);font:var(--type-caption);letter-spacing:.04em;}
.divider{border:none;border-top:1px solid var(--color-border);margin:2px 0 12px;}
.button{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid transparent;cursor:pointer;white-space:nowrap;letter-spacing:-.015em;font:var(--type-body);font-weight:620;transition:transform var(--motion-duration-fast) var(--motion-ease-emphasized),box-shadow var(--motion-duration-base) var(--motion-ease-standard),background-color var(--motion-duration-base) var(--motion-ease-standard),border-color var(--motion-duration-base) var(--motion-ease-standard),color var(--motion-duration-base) var(--motion-ease-standard);}
.button:focus-visible{outline:none;}
.button.lg{min-height:var(--size-button-height-lg);padding:0 26px;border-radius:var(--radius-full);}
.button.md{min-height:var(--size-button-height-md);padding:0 18px;border-radius:18px;}
.button.primary{background:linear-gradient(180deg,var(--yujian-primary-500) 0%,var(--color-primary) 100%);color:var(--color-on-primary);border-color:rgba(255,255,255,.26);box-shadow:inset 0 1px 0 rgba(255,255,255,.34),0 10px 18px -12px rgba(111,159,86,.34),var(--shadow-1);}
.button.primary:hover{background:linear-gradient(180deg,var(--yujian-primary-500) 0%,var(--color-primary-hover) 100%);transform:translateY(-1px);box-shadow:inset 0 1px 0 rgba(255,255,255,.42),0 12px 22px -12px rgba(111,159,86,.28),var(--shadow-2);}
.button.primary:focus-visible{box-shadow:inset 0 1px 0 rgba(255,255,255,.42),0 0 0 4px var(--interactive-focus),var(--shadow-2);}
.button.primary:active{transform:translateY(1px) scale(var(--motion-press-scale));box-shadow:inset 0 1px 0 rgba(255,255,255,.28),var(--shadow-1);}
.button.secondary{background:rgba(255,255,255,.72);color:var(--color-primary);border-color:rgba(93,108,77,.10);box-shadow:inset 0 1px 0 rgba(255,255,255,.66),var(--shadow-1);}
.button.secondary:hover{background:var(--color-surface);transform:translateY(-1px);box-shadow:inset 0 1px 0 rgba(255,255,255,.7),var(--shadow-2);}
.button.secondary:focus-visible{box-shadow:inset 0 1px 0 rgba(255,255,255,.7),0 0 0 4px var(--interactive-focus),var(--shadow-2);}
.button.secondary:active{transform:translateY(1px) scale(var(--motion-press-scale));box-shadow:var(--shadow-1);}
.button:disabled{cursor:default;transform:none;box-shadow:none;}
.button.primary:disabled{background:var(--color-primary-container);color:var(--color-on-primary-container);border-color:rgba(255,255,255,.34);}
.button.secondary:disabled{background:var(--color-surface-container);color:var(--color-muted-foreground);border-color:rgba(93,108,77,.08);}
</style>
</head>
<body>
<div class="row">
  <span class="label">核心 CTA</span>
  <button class="button primary lg" type="button">开始</button>
  <button class="button primary lg" type="button" disabled>开始</button>
</div>
<hr class="divider">
<div class="row">
  <span class="label">继续引导</span>
  <button class="button primary lg" type="button">继续</button>
  <button class="button primary lg" type="button" disabled>继续</button>
</div>
<hr class="divider">
<div class="row">
  <span class="label">轻量操作</span>
  <button class="button secondary md" type="button">稍后</button>
  <button class="button secondary md" type="button" disabled>稍后</button>
</div>
</body>
</html>
