<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Parenting AI App Ready Complete Flow</title>
  <style>
    :root { --app-max-width: 480px; }
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #f8f6e9;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    body {
      display: grid;
      place-items: center;
    }
    /* App Root */
    #app {
      width: min(100%, var(--app-max-width));
      height: 100dvh;
      min-height: 100dvh;
      overflow: hidden;
      background: #fff;
    }
    #appStage {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }
  </style>
</head>
<body>
  <main id="app" aria-label="Parenting AI complete product flow">
    <!-- Main Content -->
    <iframe id="appStage" title="Parenting AI complete product flow"></iframe>
  </main>
  <script>
    const appPages = [
      "\u003c!doctype html\u003e\n\u003chtml lang=\"zh-CN\"\u003e\n\u003chead\u003e\n  \u003cmeta charset=\"utf-8\" /\u003e\n  \u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1, viewport-fit=cover\" /\u003e\n  \u003ctitle\u003e育见 - 启动与登录页高保真原型\u003c/title\u003e\n  \u003cstyle\u003e\n    :root {\n      --green-deep: #6f9f56;\n      --radius-pill: 999px;\n      --safe-bottom: env(safe-area-inset-bottom, 0px);\n      --safe-top: env(safe-area-inset-top, 0px);\n    }\n\n    * {\n      box-sizing: border-box;\n    }\n\n    html,\n    body {\n      width: 100%;\n      height: 100%;\n      margin: 0;\n      overflow: hidden;\n      color: #111814;\n      background:\n        radial-gradient(circle at 20% 12%, rgba(144, 215, 103, 0.2), transparent 32%),\n        radial-gradient(circle at 78% 18%, rgba(241, 236, 155, 0.26), transparent 31%),\n        #f8f6e9;\n      font-family: -apple-system, BlinkMacSystemFont, \"SF Pro Display\", \"SF Pro Text\", \"PingFang SC\", \"Microsoft YaHei\", sans-serif;\n    }\n\n    body {\n      display: grid;\n      place-items: center;\n      padding: 0;\n    }\n\n    button,\n    input {\n      font: inherit;\n    }\n\n    button {\n      border: 0;\n      cursor: pointer;\n      -webkit-tap-highlight-color: transparent;\n    }\n\n    svg {\n      display: block;\n    }\n\n    .app-safe-top {\n      height: 76px;\n      height: max(76px, var(--safe-top));\n      flex: 0 0 auto;\n    }\n\n    .startup-gate {\n      width: min(100%, 430px);\n      max-width: 100vw;\n      height: 100dvh;\n      position: relative;\n      overflow: hidden;\n      color: #111814;\n      background:\n        radial-gradient(circle at 21% 12%, rgba(144, 215, 103, 0.58), transparent 29%),\n        radial-gradient(circle at 72% 16%, rgba(241, 236, 155, 0.62), transparent 30%),\n        radial-gradient(circle at 68% 65%, rgba(255, 255, 255, 0.96), transparent 38%),\n        linear-gradient(180deg, #f6f1c9 0%, #f8f7e8 54%, #edf4df 100%);\n    }\n\n    .startup-gate::before,\n    .startup-gate::after {\n      content: \"\";\n      position: absolute;\n      border: 1px solid rgba(255, 255, 255, 0.58);\n      border-radius: 50%;\n      pointer-events: none;\n    }\n\n    .startup-gate::before {\n      width: 560px;\n      height: 560px;\n      left: -218px;\n      top: -54px;\n    }\n\n    .startup-gate::after {\n      width: 320px;\n      height: 320px;\n      right: -154px;\n      top: 70px;\n    }\n\n    .startup-screen {\n      position: absolute;\n      inset: 0;\n      display: grid;\n      grid-template-rows: auto 1fr auto;\n      padding: 0 42px calc(38px + var(--safe-bottom));\n      opacity: 0;\n      pointer-events: none;\n      transform: translateY(14px);\n      transition: opacity 480ms ease, transform 480ms ease;\n    }\n\n    .startup-screen.active {\n      opacity: 1;\n      pointer-events: auto;\n      transform: translateY(0);\n    }\n\n    .startup-center {\n      align-self: center;\n      text-align: center;\n      transform: translateY(-18px);\n    }\n\n    .startup-title {\n      margin: 0;\n      color: #181b18;\n      font-size: 56px;\n      line-height: 1.08;\n      font-weight: 860;\n      letter-spacing: 0;\n    }\n\n    .startup-subtitle {\n      margin: 16px 0 0;\n      color: #20231f;\n      font-size: 26px;\n      line-height: 1.3;\n      font-weight: 760;\n      letter-spacing: 0.08em;\n    }\n\n    .startup-login-content {\n      align-self: center;\n      display: grid;\n      gap: 22px;\n      transform: translateY(-26px);\n    }\n\n    .startup-login-title {\n      margin: 0 0 142px;\n      color: #102210;\n      font-size: 42px;\n      line-height: 1.4;\n      font-weight: 840;\n      letter-spacing: 0;\n    }\n\n    .startup-fields {\n      display: grid;\n      gap: 18px;\n    }\n\n    .startup-field {\n      height: 58px;\n      border-radius: var(--radius-pill);\n      padding: 0 24px;\n      display: grid;\n      grid-template-columns: 28px minmax(0, 1fr) auto;\n      align-items: center;\n      gap: 14px;\n      color: #9ea19a;\n      background: rgba(255, 255, 255, 0.82);\n      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.78);\n    }\n\n    .startup-field svg {\n      width: 22px;\n      height: 22px;\n      stroke-width: 1.9;\n    }\n\n    .startup-input {\n      width: 100%;\n      border: 0;\n      outline: 0;\n      color: #222720;\n      background: transparent;\n      font-size: 17px;\n      font-weight: 560;\n    }\n\n    .startup-input::placeholder {\n      color: #a4a69f;\n    }\n\n    .code-action {\n      color: var(--green-deep);\n      background: transparent;\n      font-size: 15px;\n      font-weight: 760;\n      white-space: nowrap;\n    }\n\n    .startup-login-button {\n      width: min(245px, 80%);\n      height: 58px;\n      justify-self: center;\n      margin-top: 22px;\n      border-radius: var(--radius-pill);\n      color: #162211;\n      background:\n        radial-gradient(circle at 18% 50%, rgba(158, 203, 72, 0.95), transparent 28%),\n        radial-gradient(circle at 82% 50%, rgba(226, 238, 114, 0.95), transparent 31%),\n        linear-gradient(90deg, #d7f065, #edf17f);\n      box-shadow:\n        0 16px 28px rgba(133, 167, 49, 0.22),\n        inset 0 0 0 1px rgba(255, 255, 255, 0.72);\n      font-size: 19px;\n      font-weight: 820;\n      letter-spacing: 0.08em;\n    }\n\n    .startup-tip {\n      margin: 0;\n      color: var(--green-deep);\n      text-align: center;\n      font-size: 14px;\n      font-weight: 690;\n    }\n\n    .startup-terms {\n      align-self: end;\n      margin: 0;\n      color: rgba(79, 83, 76, 0.58);\n      text-align: center;\n      font-size: 13px;\n      line-height: 1.8;\n      font-weight: 620;\n    }\n\n    .startup-terms a {\n      color: #6f9f56;\n      text-decoration: underline;\n      text-underline-offset: 3px;\n    }\n\n    @media (min-width: 520px) {\n      body {\n        padding: 24px;\n      }\n\n      .startup-gate {\n        height: min(920px, calc(100dvh - 48px));\n      }\n    }\n\n    @media (max-width: 380px) {\n      .startup-screen {\n        padding-inline: 32px;\n      }\n\n      .startup-title {\n        font-size: 50px;\n      }\n\n      .startup-subtitle {\n        font-size: 23px;\n      }\n\n      .startup-login-title {\n        margin-bottom: 104px;\n        font-size: 37px;\n      }\n\n      .startup-field {\n        height: 54px;\n        padding-inline: 20px;\n      }\n    }\n  \u003c/style\u003e\n\u003c/head\u003e\n\u003cbody\u003e\n  \u003cmain id=\"app\" class=\"app-shell startup-gate\" aria-label=\"育见启动与登录高保真原型\"\u003e\n    \u003c!-- App Content --\u003e\n    \u003c!-- Welcome Screen --\u003e\n    \u003csection class=\"startup-screen active\" id=\"startupWelcome\" aria-label=\"欢迎页\"\u003e\n      \u003cdiv class=\"app-safe-top\" aria-hidden=\"true\"\u003e\u003c/div\u003e\n\u003cdiv class=\"startup-center\"\u003e\n        \u003ch1 class=\"startup-title\"\u003e你好！\u003c/h1\u003e\n        \u003cp class=\"startup-subtitle\"\u003e欢迎来到育见\u003c/p\u003e\n      \u003c/div\u003e\n      \u003cp class=\"startup-terms\"\u003e\n        登录即代表你已阅读并同意\u003cbr\u003e\n        \u003ca href=\"#\"\u003e《用户协议》\u003c/a\u003e　\u003ca href=\"#\"\u003e《隐私政策》\u003c/a\u003e\n      \u003c/p\u003e\n    \u003c/section\u003e\n\n    \u003c!-- Login Screen --\u003e\n    \u003csection class=\"startup-screen\" id=\"startupLogin\" aria-label=\"登录页\"\u003e\n      \u003cdiv class=\"app-safe-top\" aria-hidden=\"true\"\u003e\u003c/div\u003e\n\u003cdiv class=\"startup-login-content\"\u003e\n        \u003ch1 class=\"startup-login-title\"\u003e欢迎回来！\u003cbr\u003e育见\u003c/h1\u003e\n        \u003cdiv class=\"startup-fields\"\u003e\n          \u003clabel class=\"startup-field\"\u003e\n            \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"\u003e\n              \u003cpath d=\"M9 2.8h6a2 2 0 0 1 2 2v14.4a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2V4.8a2 2 0 0 1 2-2z\" stroke=\"currentColor\"/\u003e\n              \u003cpath d=\"M11 18.2h2\" stroke=\"currentColor\" stroke-linecap=\"round\"/\u003e\n            \u003c/svg\u003e\n            \u003cinput class=\"startup-input\" type=\"tel\" inputmode=\"tel\" placeholder=\"手机号\" aria-label=\"手机号\"\u003e\n          \u003c/label\u003e\n          \u003clabel class=\"startup-field\"\u003e\n            \u003csvg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"\u003e\n              \u003cpath d=\"M12 3.6 18.2 6v5.1c0 4-2.46 7.55-6.2 9.3-3.74-1.75-6.2-5.3-6.2-9.3V6L12 3.6z\" stroke=\"currentColor\" stroke-linejoin=\"round\"/\u003e\n              \u003cpath d=\"m9.5 12 1.8 1.8 3.4-4\" stroke=\"currentColor\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/\u003e\n            \u003c/svg\u003e\n            \u003cinput class=\"startup-input\" type=\"text\" inputmode=\"numeric\" placeholder=\"验证码\" aria-label=\"验证码\"\u003e\n            \u003cbutton class=\"code-action\" type=\"button\"\u003e获取验证码\u003c/button\u003e\n          \u003c/label\u003e\n        \u003c/div\u003e\n        \u003cbutton class=\"startup-login-button\" id=\"startupLoginButton\" type=\"button\"\u003e立即登录\u003c/button\u003e\n        \u003cp class=\"startup-tip\"\u003e未注册手机号登录后将自动创建账号\u003c/p\u003e\n      \u003c/div\u003e\n      \u003cp class=\"startup-terms\"\u003e\n        登录即代表你已阅读并同意　\u003ca href=\"#\"\u003e《用户协议》\u003c/a\u003e　\u003ca href=\"#\"\u003e《隐私政策》\u003c/a\u003e\n      \u003c/p\u003e\n    \u003c/section\u003e\n  \u003c/main\u003e\n\n  \u003cscript\u003e\n    const startupWelcome = document.querySelector(\"#startupWelcome\");\n    const startupLogin = document.querySelector(\"#startupLogin\");\n    const startupLoginButton = document.querySelector(\"#startupLoginButton\");\n\n    window.setTimeout(() =\u003e {\n      startupWelcome.classList.remove(\"active\");\n      startupLogin.classList.add(\"active\");\n    }, 1550);\n\n    startupLoginButton.addEventListener(\"click\", () =\u003e {\n      window.parent.postMessage({ type: \"parenting-ai-flow-next\", from: \"startup\" }, \"*\");\n    });\n  \u003c/script\u003e\n\u003c/body\u003e\n\u003c/html\u003e\n",
      "\u003c!doctype html\u003e\n\u003chtml lang=\"zh-CN\"\u003e\n\u003chead\u003e\n  \u003cmeta charset=\"utf-8\" /\u003e\n  \u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1, viewport-fit=cover\" /\u003e\n  \u003ctitle\u003e正式分析前专项采集高保真原型\u003c/title\u003e\n  \u003cstyle\u003e\n    :root {\n      --green: #9dcc75;\n      --green-deep: #6f9f56;\n      --green-soft: #f1f8df;\n      --mint: #eef7cf;\n      --butter: #f6edb4;\n      --butter-soft: #fbf7dc;\n      --purple: #d5c96e;\n      --purple-soft: #fbf6d9;\n      --ink: #202633;\n      --ink-soft: #6f7480;\n      --muted: #9ca0a8;\n      --card: rgba(255, 255, 247, 0.88);\n      --line: rgba(73, 91, 45, 0.08);\n      --shadow-card: 0 18px 46px rgba(31, 39, 51, 0.045);\n      --shadow-soft: 0 8px 22px rgba(31, 39, 51, 0.06);\n      --radius-card: 28px;\n      --radius-row: 24px;\n      --radius-pill: 999px;\n      --safe-bottom: env(safe-area-inset-bottom, 0px);\n      --safe-top: env(safe-area-inset-top, 0px);\n    }\n\n    * {\n      box-sizing: border-box;\n    }\n\n    html,\n    body {\n      width: 100%;\n      height: 100%;\n      margin: 0;\n      overflow: hidden;\n      color: var(--ink);\n      background:\n        radial-gradient(circle at 75% 12%, rgba(171, 221, 108, 0.26), transparent 31%),\n        radial-gradient(circle at 12% 8%, rgba(247, 231, 143, 0.36), transparent 30%),\n        #f8f6e9;\n      font-family: -apple-system, BlinkMacSystemFont, \"SF Pro Display\", \"SF Pro Text\", \"PingFang SC\", \"Microsoft YaHei\", sans-serif;\n      font-size: 16px;\n      line-height: 1.5;\n      touch-action: pan-y;\n    }\n\n    body {\n      display: grid;\n      place-items: center;\n    }\n\n    button,\n    input,\n    textarea {\n      font: inherit;\n    }\n\n    button {\n      border: 0;\n      cursor: pointer;\n      -webkit-tap-highlight-color: transparent;\n      transition: transform 180ms ease-out, background-color 180ms ease-out, color 180ms ease-out, box-shadow 180ms ease-out, opacity 180ms ease-out;\n    }\n\n    button:active:not(:disabled) {\n      animation: button-pop 190ms ease-out;\n    }\n\n    button:disabled {\n      cursor: default;\n    }\n\n    svg {\n      display: block;\n    }\n\n    .app-safe-top {\n      height: 42px;\n      height: max(42px, var(--safe-top));\n      flex: 0 0 auto;\n    }\n\n    .app-shell {\n      width: min(100%, 430px);\n      max-width: 100vw;\n      height: 100dvh;\n      overflow: hidden;\n      position: relative;\n      display: grid;\n      grid-template-rows: auto auto 1fr auto;\n      background:\n        radial-gradient(circle at 76% 12%, rgba(162, 216, 103, 0.34), transparent 31%),\n        radial-gradient(circle at 12% 22%, rgba(247, 233, 154, 0.42), transparent 30%),\n        radial-gradient(circle at 58% 52%, rgba(238, 247, 207, 0.72), transparent 38%),\n        linear-gradient(180deg, #fbfaec 0%, #f8f6e5 52%, #f6f4e6 100%);\n    }\n\n    .top-bar {\n      display: none;\n      padding: 16px 24px 8px;\n      z-index: 5;\n    }\n\n    .title-stack {\n      min-width: 0;\n      display: grid;\n      gap: 10px;\n    }\n\n    .top-title {\n      margin: 0;\n      color: var(--ink);\n      font-size: 34px;\n      line-height: 1.08;\n      font-weight: 820;\n      letter-spacing: 0;\n      overflow-wrap: anywhere;\n    }\n\n    .top-meta {\n      min-width: 0;\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      gap: 10px;\n    }\n\n    .top-meta.hidden {\n      display: none;\n    }\n\n    .top-meta.no-child {\n      justify-content: flex-end;\n    }\n\n    .child-pill,\n    .top-state {\n      min-height: 38px;\n      border-radius: var(--radius-pill);\n      padding: 6px 13px 6px 7px;\n      display: inline-flex;\n      align-items: center;\n      gap: 8px;\n      color: var(--ink);\n      background: rgba(255, 255, 255, 0.82);\n      box-shadow: var(--shadow-soft);\n      border: 1px solid rgba(255, 255, 255, 0.8);\n      backdrop-filter: blur(18px);\n      -webkit-backdrop-filter: blur(18px);\n      font-size: 15px;\n      font-weight: 680;\n      white-space: nowrap;\n    }\n\n    .top-state {\n      padding: 7px 13px;\n      color: var(--green-deep);\n      background: rgba(255, 255, 255, 0.76);\n    }\n\n    .child-pill.hidden {\n      display: none;\n    }\n\n    .top-state.hidden {\n      display: none;\n    }\n\n    .avatar-face {\n      width: 28px;\n      height: 28px;\n      border-radius: 50%;\n      display: grid;\n      place-items: center;\n      background: linear-gradient(180deg, #fbf0b8, #dff0a9);\n      color: var(--green-deep);\n      font-size: 17px;\n      font-weight: 820;\n    }\n\n    .child-name {\n      max-width: 86px;\n      overflow: hidden;\n      text-overflow: ellipsis;\n      white-space: nowrap;\n    }\n\n    .progress-wrap {\n      padding: 8px 24px 12px;\n      z-index: 4;\n    }\n\n    .progress-track {\n      height: 8px;\n      overflow: hidden;\n      border-radius: var(--radius-pill);\n      background: rgba(255, 255, 255, 0.72);\n      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.74);\n    }\n\n    .progress-bar {\n      display: block;\n      width: 8%;\n      height: 100%;\n      border-radius: inherit;\n      background: linear-gradient(135deg, #a7d77a, #7fb964);\n      box-shadow: 0 6px 14px rgba(125, 176, 86, 0.18);\n      transition: width 360ms cubic-bezier(0.22, 1, 0.36, 1);\n    }\n\n    .page {\n      min-height: 0;\n      overflow-y: auto;\n      overflow-x: hidden;\n      padding: 8px 20px 18px;\n      scrollbar-width: none;\n      touch-action: pan-y;\n    }\n\n    .page::-webkit-scrollbar {\n      display: none;\n    }\n\n    .page.page-entering .hero-card,\n    .page.page-entering .section,\n    .page.page-entering .soft-card,\n    .page.page-entering .field-card,\n    .page.page-entering .record-box,\n    .page.page-entering .summary-card,\n    .page.page-entering .profile-block {\n      animation: page-rise 320ms cubic-bezier(0.22, 1, 0.36, 1) both;\n    }\n\n    .page.page-entering .section:nth-of-type(2),\n    .page.page-entering .field-card:nth-child(2),\n    .page.page-entering .profile-block:nth-child(2) {\n      animation-delay: 35ms;\n    }\n\n    .page.page-entering .section:nth-of-type(3),\n    .page.page-entering .field-card:nth-child(3),\n    .page.page-entering .profile-block:nth-child(3) {\n      animation-delay: 70ms;\n    }\n\n    .page.page-entering .section:nth-of-type(4),\n    .page.page-entering .field-card:nth-child(4),\n    .page.page-entering .profile-block:nth-child(4) {\n      animation-delay: 105ms;\n    }\n\n    .hero-card,\n    .soft-card,\n    .field-card,\n    .record-box,\n    .summary-card,\n    .profile-block,\n    .bottom-actions {\n      background: var(--card);\n      box-shadow: var(--shadow-card);\n      backdrop-filter: blur(20px);\n      -webkit-backdrop-filter: blur(20px);\n      border: 0;\n      background-clip: padding-box;\n    }\n\n    .hero-card {\n      min-height: auto;\n      border-radius: 31px;\n      position: relative;\n      overflow: hidden;\n      padding: 30px 26px;\n      display: grid;\n      align-content: start;\n      isolation: isolate;\n      margin-bottom: 16px;\n    }\n\n    .hero-card.compact {\n      min-height: auto;\n    }\n\n    .hero-card::before {\n      content: \"\";\n      position: absolute;\n      inset: 0;\n      background:\n        radial-gradient(circle at 90% 8%, rgba(155, 214, 110, 0.18), transparent 30%),\n        radial-gradient(circle at 8% 4%, rgba(255, 250, 220, 0.96), transparent 42%);\n      z-index: -2;\n    }\n\n    .hero-title {\n      width: 100%;\n      margin: 0;\n      color: var(--ink);\n      font-size: 29px;\n      line-height: 1.28;\n      font-weight: 820;\n      letter-spacing: 0;\n    }\n\n    .hero-copy {\n      width: 100%;\n      margin: 14px 0 0;\n      color: var(--ink-soft);\n      font-size: 15px;\n      line-height: 1.65;\n      font-weight: 470;\n    }\n\n    .section {\n      margin: 0 0 14px;\n    }\n\n    .section-title {\n      margin: 0 0 9px;\n      color: var(--muted);\n      font-size: 14px;\n      font-weight: 720;\n    }\n\n    .soft-card,\n    .summary-card,\n    .profile-block {\n      border-radius: var(--radius-row);\n      padding: 17px;\n      color: var(--ink);\n    }\n\n    .soft-card h2,\n    .soft-card h3,\n    .summary-card h2,\n    .summary-card h3,\n    .profile-block h2,\n    .profile-block h3 {\n      margin: 0;\n      color: var(--ink);\n      font-size: 17px;\n      line-height: 1.45;\n      font-weight: 780;\n    }\n\n    .soft-card p,\n    .summary-card p,\n    .profile-block p,\n    .summary-list li,\n    .record-tip {\n      color: var(--ink-soft);\n      font-size: 14px;\n      line-height: 1.68;\n    }\n\n    .soft-card p,\n    .summary-card p,\n    .profile-block p {\n      margin: 7px 0 0;\n    }\n\n    .hint-block {\n      margin-top: 12px;\n      padding: 12px;\n      border-radius: 18px;\n      color: var(--green-deep);\n      background: var(--green-soft);\n      font-size: 14px;\n      line-height: 1.62;\n      font-weight: 650;\n    }\n\n    .form-grid {\n      display: grid;\n      gap: 12px;\n    }\n\n    .split-grid {\n      display: grid;\n      grid-template-columns: 1fr 1fr;\n      gap: 12px;\n    }\n\n    .field-card {\n      min-width: 0;\n      border-radius: var(--radius-row);\n      padding: 13px 14px;\n    }\n\n    .field-label {\n      display: block;\n      margin: 0 0 7px;\n      color: var(--muted);\n      font-size: 13px;\n      font-weight: 720;\n    }\n\n    .text-field,\n    .textarea-field,\n    .record-area {\n      width: 100%;\n      border: 0;\n      outline: 0;\n      resize: none;\n      color: var(--ink);\n      background: transparent;\n      font-size: 16px;\n      line-height: 1.55;\n    }\n\n    .text-field::placeholder,\n    .textarea-field::placeholder,\n    .record-area::placeholder {\n      color: var(--muted);\n    }\n\n    .textarea-field {\n      min-height: 74px;\n    }\n\n    .module-kicker {\n      display: inline-flex;\n      width: fit-content;\n      min-height: 30px;\n      align-items: center;\n      padding: 5px 11px;\n      border-radius: var(--radius-pill);\n      color: var(--green-deep);\n      background: rgba(255, 255, 255, 0.78);\n      font-size: 13px;\n      font-weight: 760;\n      box-shadow: var(--shadow-soft);\n      margin-bottom: 12px;\n    }\n\n    .record-box {\n      border-radius: 28px;\n      padding: 16px;\n    }\n\n    .record-head {\n      display: flex;\n      justify-content: space-between;\n      align-items: center;\n      gap: 12px;\n      margin-bottom: 10px;\n    }\n\n    .record-head strong {\n      color: var(--ink);\n      font-size: 17px;\n      font-weight: 780;\n    }\n\n    .record-status {\n      min-height: 30px;\n      padding: 6px 11px;\n      border-radius: var(--radius-pill);\n      color: var(--green-deep);\n      background: var(--green-soft);\n      font-size: 13px;\n      font-weight: 720;\n      white-space: nowrap;\n    }\n\n    .record-area {\n      min-height: 184px;\n      border-radius: 22px;\n      padding: 14px;\n      background: rgba(255, 255, 255, 0.82);\n      box-shadow: var(--shadow-soft);\n    }\n\n    .record-meta {\n      display: flex;\n      justify-content: space-between;\n      align-items: center;\n      gap: 10px;\n      margin-top: 10px;\n      color: var(--muted);\n      font-size: 13px;\n      font-weight: 650;\n    }\n\n    .light-prompt {\n      display: none;\n      margin-top: 12px;\n      padding: 12px;\n      border-radius: 18px;\n      color: var(--green-deep);\n      background: var(--green-soft);\n      font-size: 14px;\n      line-height: 1.62;\n      font-weight: 650;\n      animation: prompt-in 220ms cubic-bezier(0.22, 1, 0.36, 1);\n    }\n\n    .light-prompt.active {\n      display: block;\n    }\n\n    .recording-strip {\n      display: none;\n      margin-top: 12px;\n    }\n\n    .recording-strip.active {\n      display: block;\n    }\n\n    .recording-card {\n      max-width: 254px;\n      margin: 0 auto;\n      border-radius: 24px;\n      padding: 13px;\n      text-align: center;\n      background: rgba(255, 255, 255, 0.88);\n      box-shadow: var(--shadow-card);\n    }\n\n    .wave {\n      height: 36px;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      gap: 5px;\n      color: var(--green);\n    }\n\n    .wave span {\n      width: 5px;\n      border-radius: 99px;\n      background: currentColor;\n      animation: wave 0.9s infinite ease-in-out;\n    }\n\n    .wave span:nth-child(1) { height: 8px; animation-delay: 0s; }\n    .wave span:nth-child(2) { height: 16px; animation-delay: 0.08s; }\n    .wave span:nth-child(3) { height: 26px; animation-delay: 0.16s; }\n    .wave span:nth-child(4) { height: 34px; animation-delay: 0.24s; }\n    .wave span:nth-child(5) { height: 26px; animation-delay: 0.32s; }\n    .wave span:nth-child(6) { height: 16px; animation-delay: 0.4s; }\n    .wave span:nth-child(7) { height: 8px; animation-delay: 0.48s; }\n\n    .recording-text {\n      margin: 6px 0 0;\n      color: var(--ink);\n      font-size: 14px;\n      font-weight: 720;\n    }\n\n    .cancel-hint {\n      margin: 2px 0 0;\n      color: var(--ink-soft);\n      font-size: 12px;\n    }\n\n    .chips {\n      display: flex;\n      flex-wrap: wrap;\n      gap: 9px;\n    }\n\n    .chip,\n    .secondary-button,\n    .quiet-button,\n    .primary-button {\n      min-height: 44px;\n      padding: 9px 15px;\n      border-radius: var(--radius-pill);\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      gap: 7px;\n      color: var(--green-deep);\n      background: var(--green-soft);\n      font-size: 15px;\n      font-weight: 760;\n      text-align: center;\n      white-space: normal;\n      overflow-wrap: anywhere;\n    }\n\n    .chip {\n      min-height: 34px;\n      padding: 7px 13px;\n      font-size: 14px;\n      box-shadow: none;\n    }\n\n    .chip:hover,\n    .secondary-button:hover,\n    .quiet-button:hover {\n      background: #e8f4d2;\n    }\n\n    .primary-button {\n      color: #fff;\n      background: linear-gradient(135deg, #a7d77a, #7fb964);\n      box-shadow: 0 12px 24px rgba(125, 176, 86, 0.22);\n    }\n\n    .primary-button:disabled {\n      color: #b5b8be;\n      background: rgba(255, 255, 255, 0.78);\n      box-shadow: var(--shadow-soft);\n    }\n\n    .quiet-button {\n      color: var(--ink-soft);\n      background: rgba(255, 255, 255, 0.78);\n      box-shadow: var(--shadow-soft);\n    }\n\n    .button-icon {\n      width: 18px;\n      height: 18px;\n      flex: 0 0 auto;\n      display: inline-grid;\n      place-items: center;\n    }\n\n    .summary-list {\n      margin: 9px 0 0;\n      padding-left: 18px;\n    }\n\n    .summary-list li + li {\n      margin-top: 6px;\n    }\n\n    .profile-grid {\n      display: grid;\n      gap: 14px;\n    }\n\n    .loading-wrap {\n      min-height: 62vh;\n      display: grid;\n      place-items: center;\n      text-align: center;\n    }\n\n    .loader {\n      width: 62px;\n      height: 62px;\n      border-radius: 50%;\n      margin: 0 auto 18px;\n      border: 7px solid rgba(255, 255, 255, 0.72);\n      border-top-color: var(--green);\n      box-shadow: var(--shadow-soft);\n      animation: spin 0.9s linear infinite;\n    }\n\n    .loading-wrap h2 {\n      margin: 0;\n      color: var(--ink);\n      font-size: 22px;\n      line-height: 1.35;\n      font-weight: 820;\n    }\n\n    .loading-wrap p {\n      max-width: 312px;\n      margin: 10px auto 0;\n      color: var(--ink-soft);\n      font-size: 14px;\n      line-height: 1.7;\n    }\n\n    .bottom-actions {\n      margin: 0 16px calc(10px + var(--safe-bottom));\n      border-radius: 24px;\n      padding: 10px;\n      display: grid;\n      grid-template-columns: 1fr;\n      gap: 9px;\n      z-index: 10;\n      background: rgba(255, 255, 255, 0.76);\n      border: 1px solid rgba(255, 255, 255, 0.58);\n      box-shadow: 0 6px 18px rgba(31, 39, 51, 0.055);\n      backdrop-filter: blur(22px) saturate(1.35);\n      -webkit-backdrop-filter: blur(22px) saturate(1.35);\n    }\n\n    .bottom-actions:empty {\n      display: none;\n    }\n\n    .bottom-actions.dense {\n      grid-template-columns: 1fr 1fr;\n    }\n\n    .bottom-actions.dense .primary-button:first-child {\n      grid-column: 1 / -1;\n    }\n\n    .bottom-actions .primary-button,\n    .bottom-actions .secondary-button,\n    .bottom-actions .quiet-button {\n      width: 100%;\n      min-height: 48px;\n    }\n\n    @keyframes page-rise {\n      from {\n        opacity: 0;\n        transform: translateY(12px) scale(0.992);\n      }\n      to {\n        opacity: 1;\n        transform: translateY(0) scale(1);\n      }\n    }\n\n    @keyframes button-pop {\n      0% { transform: scale(1); }\n      45% { transform: scale(0.98); }\n      75% { transform: scale(1.02); }\n      100% { transform: scale(1); }\n    }\n\n    @keyframes prompt-in {\n      from {\n        opacity: 0;\n        transform: translateY(8px);\n      }\n      to {\n        opacity: 1;\n        transform: translateY(0);\n      }\n    }\n\n    @keyframes wave {\n      0%, 100% { transform: scaleY(0.55); opacity: 0.55; }\n      50% { transform: scaleY(1); opacity: 1; }\n    }\n\n    @keyframes spin {\n      to { transform: rotate(360deg); }\n    }\n\n    @media (max-width: 374px) {\n      .top-title {\n        font-size: 30px;\n      }\n\n      .hero-title {\n        font-size: 26px;\n      }\n\n      .hero-copy {\n        font-size: 14px;\n      }\n\n      .split-grid {\n        grid-template-columns: 1fr;\n      }\n    }\n\n    @media (min-width: 431px) {\n      .app-shell {\n        height: min(100dvh, 880px);\n        border-radius: 42px;\n        box-shadow: 0 28px 70px rgba(32, 38, 51, 0.16);\n      }\n    }\n  \u003c/style\u003e\n\u003c/head\u003e\n\u003cbody\u003e\n  \u003cmain id=\"app\" class=\"app-shell\" aria-label=\"正式分析前专项采集高保真原型\"\u003e\n    \u003c!-- Safe Area Spacer --\u003e\n    \u003cdiv class=\"app-safe-top\" aria-hidden=\"true\"\u003e\u003c/div\u003e\n\u003c!-- App Header --\u003e\n    \u003cheader class=\"top-bar\"\u003e\n      \u003cdiv class=\"title-stack\"\u003e\n        \u003ch1 class=\"top-title\" id=\"topTitle\"\u003e先说几段真实情况\u003c/h1\u003e\n        \u003cdiv class=\"top-meta no-child hidden\"\u003e\n          \u003cdiv class=\"child-pill hidden\" aria-label=\"当前孩子\"\u003e\n            \u003cspan class=\"avatar-face\" aria-hidden=\"true\"\u003e育\u003c/span\u003e\n            \u003cspan class=\"child-name\" id=\"childName\"\u003e小树\u003c/span\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"top-state\" id=\"topStep\"\u003e开始前\u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/header\u003e\n\n    \u003c!-- Progress Indicator --\u003e\n    \u003csection class=\"progress-wrap\" aria-label=\"采集进度\"\u003e\n      \u003cdiv class=\"progress-track\"\u003e\n        \u003cspan class=\"progress-bar\" id=\"progressBar\"\u003e\u003c/span\u003e\n      \u003c/div\u003e\n    \u003c/section\u003e\n\n    \u003c!-- Main Content --\u003e\n    \u003csection class=\"page\" id=\"page\"\u003e\u003c/section\u003e\n    \u003c!-- Bottom Actions --\u003e\n    \u003cfooter class=\"bottom-actions\" id=\"bottomActions\"\u003e\u003c/footer\u003e\n  \u003c/main\u003e\n\n  \u003cscript\u003e\n    const page = document.querySelector(\"#page\");\n    const bottomActions = document.querySelector(\"#bottomActions\");\n    const topTitle = document.querySelector(\"#topTitle\");\n    const topStep = document.querySelector(\"#topStep\");\n    const childName = document.querySelector(\"#childName\");\n    const childPill = document.querySelector(\".child-pill\");\n    const topMeta = document.querySelector(\".top-meta\");\n    const progressBar = document.querySelector(\"#progressBar\");\n\n    const icons = {\n      arrow: `\u003csvg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"\u003e\u003cpath d=\"M5 12h13\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"/\u003e\u003cpath d=\"m13 6 6 6-6 6\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/\u003e\u003c/svg\u003e`,\n      check: `\u003csvg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"\u003e\u003cpath d=\"m5 12.6 4.2 4.2L19.5 6.5\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/\u003e\u003c/svg\u003e`,\n      mic: `\u003csvg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"\u003e\u003cpath d=\"M12 4a3 3 0 0 0-3 3v5a3 3 0 0 0 6 0V7a3 3 0 0 0-3-3Z\" stroke=\"currentColor\" stroke-width=\"2.1\"/\u003e\u003cpath d=\"M5.5 11.5a6.5 6.5 0 0 0 13 0M12 18v3\" stroke=\"currentColor\" stroke-width=\"2.1\" stroke-linecap=\"round\"/\u003e\u003c/svg\u003e`,\n      edit: `\u003csvg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"\u003e\u003cpath d=\"M4 19.5h4.2L19 8.7 15.3 5 4.5 15.8 4 19.5Z\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linejoin=\"round\"/\u003e\u003cpath d=\"m14.4 5.9 3.7 3.7\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"/\u003e\u003c/svg\u003e`,\n      home: `\u003csvg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"\u003e\u003cpath d=\"m4 11 8-7 8 7\" stroke=\"currentColor\" stroke-width=\"2.1\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/\u003e\u003cpath d=\"M7 10.5V20h10v-9.5\" stroke=\"currentColor\" stroke-width=\"2.1\" stroke-linejoin=\"round\"/\u003e\u003c/svg\u003e`,\n      plus: `\u003csvg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"\u003e\u003cpath d=\"M12 5v14M5 12h14\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"/\u003e\u003c/svg\u003e`\n    };\n\n    const profile = {\n      nickname: \"小树\",\n      age: \"\",\n      grade: \"\",\n      gender: \"\",\n      city: \"\",\n      family: \"\",\n      caregiver: \"\",\n      sibling: \"\",\n      issue: \"\"\n    };\n\n    const modules = [\n      {\n        key: \"daily\",\n        title: \"孩子平时怎么过\",\n        step: \"1/4\",\n        subtitle: \"先讲讲孩子一天和一周的真实节奏。后面分析作业、手机、情绪和沟通时，会先看孩子是不是已经很累、有没有自己的时间、一天里哪里最容易紧。\",\n        body: \"请你像聊天一样说说孩子平时怎么过。可以从一个普通上学日开始讲，也可以讲周末：几点放学、回家后先做什么、什么时候写作业、什么时候玩手机，周末是补课多还是休息多。\",\n        defaultHint: \"不用评价孩子自不自觉，尽量讲真实安排。\",\n        chips: [\"上学日\", \"周末\", \"补课\", \"手机\", \"睡眠\", \"放松时刻\"],\n        prompts: [\n          \"可以从一个普通上学日开始讲，顺着说到晚上睡前，看看孩子一天里真正能自己支配的时间有多少。\",\n          \"可以补充一段周末怎么过，尤其是补课、休息、手机、出去玩大概怎么排在一起。\",\n          \"如果孩子有特别放松或特别烦的时间段，也可以顺着讲一讲那时候通常发生了什么。\",\n          \"可以顺带讲讲晚上一般几点睡，早上起床费不费劲，这会影响后面判断他是不是已经很疲惫。\"\n        ],\n        summaryTitle: \"孩子的日常节奏整理好了\",\n        summary: \"刚才这一段里，系统先把小树的日常节奏整理为：上学日晚上会进入比较集中的作业时间，周末也有补课或学习安排，自由支配的时间不算宽松。手机更常出现在作业开始前，像是他从休息切到学习前抓住的一段缓冲。后面分析作业、手机和情绪问题时，系统会先结合这段生活节奏，而不是只看他当下有没有拖延。\",\n        confirm: \"这里把“周末学习安排较多、作业前手机容易成为冲突点”作为背景记录，是否基本准确？\"\n      },\n      {\n        key: \"homework\",\n        title: \"学习和作业怎么进行\",\n        step: \"2/4\",\n        subtitle: \"这里重点讲作业从“准备开始”到“最后结束”的真实过程。后面建议不会泛泛说少催促，而是会根据你们家具体卡住的地方来判断。\",\n        body: \"请你讲讲孩子写作业通常怎么开始、怎么拖住、谁会介入、最后一般怎么结束。可以讲一件最近发生的事，也可以讲平时大概的流程。\",\n        defaultHint: \"不用先总结孩子懒不懒，尽量把作业过程说出来。\",\n        chips: [\"开始前\", \"谁提醒\", \"孩子反应\", \"谁检查\", \"拖到几点\", \"最后收场\"],\n        prompts: [\n          \"可以顺着一次最近的作业经历继续讲：他什么时候开始拖，你第一次怎么提醒，他怎么回，后来怎么升级。\",\n          \"可以把“开始前、开始后、检查、收尾”这几个阶段连起来讲一遍，看看最容易卡在哪一步。\",\n          \"可以再讲讲最后怎么收场：是写完了、拖到很晚、吵完才写，还是最后不了了之。\",\n          \"可以补一段你当时怎么推进这件事：第一次提醒、第二次催、后来有没有坐在旁边看着。\"\n        ],\n        summaryTitle: \"作业流程整理好了\",\n        summary: \"刚才这一段里，系统先把小树的作业情况整理为：问题主要集中在作业开始前。通常是大人先提醒，他拖着不动，提醒次数增加后情绪开始升起来，最后可能拖到很晚才进入作业。后面给作业建议时，系统会优先处理“作业怎么开始”这个节点，而不是一上来要求他提高效率或马上自觉。\",\n        confirm: \"这里先把“作业启动前更容易起冲突”作为主要背景记录，是否基本准确？\"\n      },\n      {\n        key: \"communication\",\n        title: \"你们通常怎么沟通\",\n        step: \"3/4\",\n        subtitle: \"这一页会帮助沟通预演更像真实孩子。重点不是判断谁对谁错，而是听你们平时怎么开口、怎么升级、孩子通常怎么接。\",\n        body: \"请你讲一次最近比较典型的对话。可以尽量复述你们当时怎么说，不用说得很完整，越接近原话越有用。比如你先说了什么，孩子怎么回，你下一句又怎么接，最后这段对话怎么结束。\",\n        defaultHint: \"尽量说原话，不用整理成道理。\",\n        chips: [\"你先说什么\", \"孩子原话\", \"孩子语气\", \"怎么升级\", \"怎么冷下来\", \"最后结果\"],\n        prompts: [\n          \"可以把最像真实吵起来的那一小段复述一下：你先说了什么，他怎么顶回来，你下一句又怎么接。\",\n          \"可以继续讲讲他生气时通常是什么样：顶嘴、沉默、哭、关门、讲条件，还是故意拖着不回应。\",\n          \"可以补一段吵完之后的状态：他会很快缓下来，还是继续冷着，你们通常怎么重新说话。\",\n          \"如果记得，可以尽量按当时的语气复述几句。沟通预演会参考这些原话，而不是生成一个很配合的孩子。\"\n        ],\n        summaryTitle: \"沟通场景整理好了\",\n        summary: \"刚才这一段里，系统先把你们的沟通方式整理为：当你开始提醒或解释担心时，小树可能先听到“又要被管了”，所以他更容易顶回来、推开你，或者用拖着不回应的方式让对话停住。后面做沟通预演时，系统会参考这些原话和反应方式来模拟小树，而不是生成一个理想化、很配合的孩子。\",\n        confirm: \"这里把“小树被提醒时更容易先防御，而不是马上接住大人的担心”作为背景记录，是否基本准确？\"\n      },\n      {\n        key: \"family\",\n        title: \"家里怎么一起支持他\",\n        step: \"4/4\",\n        subtitle: \"这里不是评价家长做得好不好，而是了解孩子面对的是怎样的家庭安排：谁提醒，谁检查，谁定规则，谁在最后收尾。\",\n        body: \"请你讲讲家里平时怎么陪孩子。包括谁主要管学习，谁提醒，谁检查，爸爸妈妈或老人看法是否一致，以前试过哪些办法，哪些有用一点，哪些反而更糟。\",\n        defaultHint: \"不用替家里任何人下结论，讲平时实际怎么做就可以。\",\n        chips: [\"谁管学习\", \"谁管生活\", \"爸爸妈妈分工\", \"老人参与\", \"规则怎么定\", \"试过的方法\"],\n        prompts: [\n          \"可以顺着作业这件事讲讲家里的分工：谁先提醒、谁盯过程、谁检查、谁最后收尾。\",\n          \"可以补充一段家里大人意见不一致的时候，孩子通常会怎么反应。\",\n          \"可以讲讲以前试过哪些办法：哪些稍微有用一点，哪些反而让孩子更抗拒。\",\n          \"可以补一段你现实里能投入多少时间和精力，这会影响后面的建议能不能真正执行。\"\n        ],\n        summaryTitle: \"家庭支持方式整理好了\",\n        summary: \"刚才这一段里，系统先把家庭支持方式整理为：学习推进主要由妈妈承担，家里会通过提醒、陪写、检查来推动孩子进入任务，但大人之间的节奏和标准可能并不完全一致。后面给家庭建议时，系统会先看谁能稳定执行、哪些做法已经试过，而不是简单要求家长再多管一点。\",\n        confirm: \"这里把“学习推动主要集中在一个照护者身上，家庭规则需要更一致”作为背景记录，是否基本准确？\"\n      }\n    ];\n\n    const state = {\n      screen: \"intro\",\n      moduleIndex: 0,\n      moduleText: {},\n      promptIndex: 0\n    };\n\n    function escapeHTML(value) {\n      return String(value)\n        .replaceAll(\"\u0026\", \"\u0026amp;\")\n        .replaceAll(\"\u003c\", \"\u0026lt;\")\n        .replaceAll(\"\u003e\", \"\u0026gt;\")\n        .replaceAll('\"', \"\u0026quot;\")\n        .replaceAll(\"'\", \"\u0026#039;\");\n    }\n\n    function setHeader(title, step, progress, showChild = true, showStep = true) {\n      topTitle.textContent = title;\n      topStep.textContent = step;\n      childName.textContent = profile.nickname || \"小树\";\n      childPill.classList.toggle(\"hidden\", !showChild);\n      topStep.classList.toggle(\"hidden\", !showStep);\n      topMeta.classList.toggle(\"hidden\", !showChild \u0026\u0026 !showStep);\n      topMeta.classList.toggle(\"no-child\", !showChild \u0026\u0026 showStep);\n      progressBar.style.width = `${Math.max(6, Math.min(100, progress))}%`;\n    }\n\n    function setPage(html) {\n      page.classList.remove(\"page-entering\");\n      page.innerHTML = html;\n      page.scrollTop = 0;\n      window.requestAnimationFrame(() =\u003e {\n        page.classList.add(\"page-entering\");\n      });\n    }\n\n    function setActions(buttons) {\n      bottomActions.innerHTML = \"\";\n      bottomActions.classList.toggle(\"dense\", buttons.length \u003e 2);\n\n      buttons.forEach((button) =\u003e {\n        const el = document.createElement(\"button\");\n        el.type = \"button\";\n        el.className = button.kind || \"primary-button\";\n        el.disabled = Boolean(button.disabled);\n        el.innerHTML = `${button.icon ? `\u003cspan class=\"button-icon\"\u003e${icons[button.icon] || \"\"}\u003c/span\u003e` : \"\"}\u003cspan\u003e${escapeHTML(button.label)}\u003c/span\u003e`;\n        el.addEventListener(\"click\", () =\u003e {\n          if (!button.disabled) button.onClick();\n        });\n        bottomActions.appendChild(el);\n      });\n    }\n\n    function renderIntro() {\n      state.screen = \"intro\";\n      setHeader(\"先说几段真实情况\", \"开始前\", 8, false, false);\n      setPage(`\n        \u003carticle class=\"hero-card\"\u003e\n          \u003ch2 class=\"hero-title\"\u003e接下来不是填问卷\u003c/h2\u003e\n          \u003cp class=\"hero-copy\"\u003e像聊天一样留下真实过程，系统再帮你整理成后续分析能用的背景。\u003c/p\u003e\n        \u003c/article\u003e\n        \u003csection class=\"section\"\u003e\n          \u003cdiv class=\"soft-card\"\u003e\n            \u003ch3\u003e每页建议说 30 秒以上\u003c/h3\u003e\n            \u003cp\u003e接下来会分几页听你讲孩子的日常、作业、沟通和家庭支持情况。不用总结性格，尽量讲真实发生的过程。\u003c/p\u003e\n          \u003c/div\u003e\n        \u003c/section\u003e\n        \u003csection class=\"section\"\u003e\n          \u003cdiv class=\"soft-card\"\u003e\n            \u003ch3\u003e轻提示只补关键细节\u003c/h3\u003e\n            \u003cp\u003e系统会根据你讲的内容轻轻提示你补充细节。后台会判断信息是否足够，但前台不会展示打分、表格或测评结果。\u003c/p\u003e\n          \u003c/div\u003e\n        \u003c/section\u003e\n        \u003csection class=\"section\"\u003e\n          \u003cdiv class=\"soft-card\"\u003e\n            \u003ch3\u003e这些内容会用于孩子画像\u003c/h3\u003e\n            \u003cp\u003e后续首页分析、沟通预演、任务建议和档案更新都会参考这份背景，让建议更贴近你们家的真实情境。\u003c/p\u003e\n          \u003c/div\u003e\n        \u003c/section\u003e\n      `);\n      setActions([{ label: \"开始录入\", icon: \"arrow\", onClick: renderBasicInfo }]);\n    }\n\n    function renderBasicInfo() {\n      state.screen = \"basic\";\n      setHeader(\"先填一点基础信息\", \"基础信息\", 18, false);\n      setPage(`\n        \u003carticle class=\"hero-card compact\"\u003e\n          \u003ch2 class=\"hero-title\"\u003e先描一笔背景\u003c/h2\u003e\n          \u003cp class=\"hero-copy\"\u003e年龄、年级和家庭结构会帮助后面的判断更有分寸。\u003c/p\u003e\n        \u003c/article\u003e\n        \u003csection class=\"form-grid\"\u003e\n          ${field(\"nickname\", \"孩子昵称\", \"例如：小树\")}\n          \u003cdiv class=\"split-grid\"\u003e\n            ${field(\"age\", \"年龄\", \"例如：9 岁\")}\n            ${field(\"grade\", \"年级\", \"例如：三年级\")}\n          \u003c/div\u003e\n          \u003cdiv class=\"split-grid\"\u003e\n            ${field(\"gender\", \"性别\", \"可选\")}\n            ${field(\"city\", \"所在城市 / 地区\", \"例如：上海\")}\n          \u003c/div\u003e\n          ${field(\"family\", \"家庭成员\", \"例如：爸爸、妈妈、孩子、奶奶\")}\n          ${field(\"caregiver\", \"主要照护者\", \"例如：妈妈主要管学习\")}\n          ${field(\"sibling\", \"是否有兄弟姐妹\", \"例如：没有 / 有一个妹妹\")}\n          \u003cdiv class=\"field-card\"\u003e\n            \u003clabel class=\"field-label\" for=\"issue\"\u003e当前最想先处理的问题\u003c/label\u003e\n            \u003ctextarea class=\"textarea-field\" id=\"issue\" placeholder=\"可以写得简单一点，例如：写作业拖拉、手机冲突、亲子沟通、情绪波动、学校反馈等。\"\u003e\u003c/textarea\u003e\n          \u003c/div\u003e\n        \u003c/section\u003e\n      `);\n\n      Object.keys(profile).forEach((key) =\u003e {\n        const el = document.querySelector(`#${key}`);\n        if (el) el.value = profile[key] || \"\";\n      });\n\n      setActions([{ label: \"提交基础信息\", icon: \"check\", onClick: submitBasicInfo }]);\n    }\n\n    function field(id, label, placeholder) {\n      return `\n        \u003cdiv class=\"field-card\"\u003e\n          \u003clabel class=\"field-label\" for=\"${id}\"\u003e${label}\u003c/label\u003e\n          \u003cinput class=\"text-field\" id=\"${id}\" type=\"text\" placeholder=\"${placeholder}\" /\u003e\n        \u003c/div\u003e\n      `;\n    }\n\n    function submitBasicInfo() {\n      [\"nickname\", \"age\", \"grade\", \"gender\", \"city\", \"family\", \"caregiver\", \"sibling\", \"issue\"].forEach((key) =\u003e {\n        const el = document.querySelector(`#${key}`);\n        if (el) profile[key] = el.value.trim();\n      });\n\n      profile.nickname = profile.nickname || \"小树\";\n      childName.textContent = profile.nickname;\n      state.moduleIndex = 0;\n      renderModuleInput();\n    }\n\n    function renderModuleInput() {\n      state.screen = \"module-input\";\n      const module = modules[state.moduleIndex];\n      const progress = 32 + state.moduleIndex * 14;\n      const saved = state.moduleText[module.key] || \"\";\n      state.promptIndex = 0;\n      setHeader(module.title, module.step, progress);\n\n      setPage(`\n        \u003carticle class=\"hero-card compact\"\u003e\n          \u003cspan class=\"module-kicker\"\u003e${module.step} 专项采集\u003c/span\u003e\n          \u003ch2 class=\"hero-title\"\u003e${module.title}\u003c/h2\u003e\n          \u003cp class=\"hero-copy\"\u003e${module.subtitle}\u003c/p\u003e\n        \u003c/article\u003e\n        \u003csection class=\"section\"\u003e\n          \u003cdiv class=\"soft-card\"\u003e\n            \u003cp\u003e${module.body}\u003c/p\u003e\n            \u003cdiv class=\"hint-block\"\u003e${module.defaultHint}\u003c/div\u003e\n          \u003c/div\u003e\n        \u003c/section\u003e\n        \u003csection class=\"section\"\u003e\n          \u003cdiv class=\"record-box\"\u003e\n            \u003cdiv class=\"record-head\"\u003e\n              \u003cstrong\u003e真实情况记录\u003c/strong\u003e\n              \u003cspan class=\"record-status\"\u003e建议 30 秒以上\u003c/span\u003e\n            \u003c/div\u003e\n            \u003ctextarea class=\"record-area\" id=\"moduleText\" placeholder=\"按住说话，建议 30 秒以上。也可以直接打字。\"\u003e${escapeHTML(saved)}\u003c/textarea\u003e\n            \u003cdiv class=\"record-meta\"\u003e\n              \u003cspan\u003e系统会先整理，不直接下结论\u003c/span\u003e\n              \u003cspan id=\"textLength\"\u003e${saved.length} 字\u003c/span\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"recording-strip\" id=\"recordingStrip\"\u003e\n              \u003cdiv class=\"recording-card\"\u003e\n                \u003cdiv class=\"wave\" aria-hidden=\"true\"\u003e\u003cspan\u003e\u003c/span\u003e\u003cspan\u003e\u003c/span\u003e\u003cspan\u003e\u003c/span\u003e\u003cspan\u003e\u003c/span\u003e\u003cspan\u003e\u003c/span\u003e\u003cspan\u003e\u003c/span\u003e\u003cspan\u003e\u003c/span\u003e\u003c/div\u003e\n                \u003cp class=\"recording-text\"\u003e正在记录\u003c/p\u003e\n                \u003cp class=\"cancel-hint\"\u003e不用停下来整理，顺着讲就好\u003c/p\u003e\n              \u003c/div\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"light-prompt\" id=\"lightPrompt\"\u003e${module.defaultHint}\u003c/div\u003e\n          \u003c/div\u003e\n        \u003c/section\u003e\n        \u003csection class=\"section\"\u003e\n          \u003cp class=\"section-title\"\u003e可以顺着这些方向讲\u003c/p\u003e\n          \u003cdiv class=\"chips\"\u003e${module.chips.map((chip) =\u003e `\u003cbutton class=\"chip\" type=\"button\" data-chip=\"${chip}\"\u003e${chip}\u003c/button\u003e`).join(\"\")}\u003c/div\u003e\n        \u003c/section\u003e\n      `);\n\n      const textarea = document.querySelector(\"#moduleText\");\n      textarea.addEventListener(\"input\", () =\u003e {\n        state.moduleText[module.key] = textarea.value;\n        document.querySelector(\"#textLength\").textContent = `${textarea.value.length} 字`;\n        if (textarea.value.length \u003e= 70) hidePrompt();\n        updateModuleActions();\n      });\n\n      document.querySelectorAll(\"[data-chip]\").forEach((chip) =\u003e {\n        chip.addEventListener(\"click\", () =\u003e {\n          textarea.value = `${textarea.value}${textarea.value ? \"\\n\" : \"\"}${chip.dataset.chip}：`;\n          textarea.focus();\n          textarea.dispatchEvent(new Event(\"input\"));\n        });\n      });\n\n      updateModuleActions();\n    }\n\n    function updateModuleActions() {\n      const module = modules[state.moduleIndex];\n      const text = (state.moduleText[module.key] || \"\").trim();\n      const enough = isUsable(text);\n      const label = !text ? \"开始说这一段\" : enough ? \"提交并整理这一部分\" : \"再讲一个具体场景\";\n\n      setActions([\n        {\n          label,\n          icon: !text ? \"mic\" : enough ? \"check\" : \"plus\",\n          onClick: () =\u003e {\n            if (!text) {\n              simulateRecording();\n            } else if (!enough) {\n              showPrompt(module.prompts[state.promptIndex % module.prompts.length]);\n              state.promptIndex += 1;\n              document.querySelector(\"#moduleText\").focus();\n            } else {\n              renderModuleSummary();\n            }\n          }\n        }\n      ]);\n    }\n\n    function isUsable(text) {\n      if (text.length \u003e= 70) return true;\n      const sceneWords = [\"有一次\", \"昨天\", \"晚上\", \"放学\", \"作业\", \"手机\", \"提醒\", \"他说\", \"我说\", \"后来\", \"最后\", \"吵\", \"检查\"];\n      const hit = sceneWords.filter((word) =\u003e text.includes(word)).length;\n      return text.length \u003e= 45 \u0026\u0026 hit \u003e= 3;\n    }\n\n    function simulateRecording() {\n      const module = modules[state.moduleIndex];\n      const strip = document.querySelector(\"#recordingStrip\");\n      const textarea = document.querySelector(\"#moduleText\");\n      strip.classList.add(\"active\");\n      setActions([{ label: \"正在记录\", icon: \"mic\", disabled: true, onClick: () =\u003e {} }]);\n\n      window.setTimeout(() =\u003e {\n        strip.classList.remove(\"active\");\n        const sample = sampleText(module.key);\n        textarea.value = sample;\n        state.moduleText[module.key] = sample;\n        document.querySelector(\"#textLength\").textContent = `${sample.length} 字`;\n        showPrompt(module.prompts[0]);\n        updateModuleActions();\n      }, 900);\n    }\n\n    function sampleText(key) {\n      const samples = {\n        daily: \"平时放学回来先吃点东西，然后会想看一会儿手机。作业一般拖到晚饭后才开始，周末有一节补课，真正自己玩的时间不太多。晚上经常到十点多才睡，早上起床也有点费劲。\",\n        homework: \"最近一次是晚上七点多，我提醒他开始写作业，他说等一下。我过了十分钟又催，他就烦了，说我一直盯着他。后来我坐旁边看，他更不想动，最后拖到很晚才开始写。\",\n        communication: \"我通常会先说你赶紧写，不然又要拖到很晚。他会回我别催了，我又不是不写。我再说每次都这样，他就会顶回来，说反正我写不写你都不满意，最后两个人都很烦。\",\n        family: \"家里主要是我管学习，爸爸有时会说几句，但不太知道每天具体作业。老人更多管吃饭和接送。以前试过奖励表，也试过坐在旁边盯着，奖励一开始有用，后来就没什么用了。\"\n      };\n      return samples[key] || \"\";\n    }\n\n    function showPrompt(text) {\n      const prompt = document.querySelector(\"#lightPrompt\");\n      if (!prompt) return;\n      prompt.textContent = text;\n      prompt.classList.add(\"active\");\n      if (navigator.vibrate) navigator.vibrate(40);\n    }\n\n    function hidePrompt() {\n      const prompt = document.querySelector(\"#lightPrompt\");\n      if (prompt) prompt.classList.remove(\"active\");\n    }\n\n    function renderModuleSummary() {\n      state.screen = \"module-summary\";\n      const module = modules[state.moduleIndex];\n      const name = profile.nickname || \"小树\";\n      const progress = 42 + state.moduleIndex * 14;\n      setHeader(module.summaryTitle, module.step, progress);\n      setPage(`\n        \u003carticle class=\"hero-card compact\"\u003e\n          \u003cspan class=\"module-kicker\"\u003e${module.step} 已整理\u003c/span\u003e\n          \u003ch2 class=\"hero-title\"\u003e${module.summaryTitle}\u003c/h2\u003e\n          \u003cp class=\"hero-copy\"\u003e先确认系统抓到的背景是否贴近真实情况。\u003c/p\u003e\n        \u003c/article\u003e\n        \u003csection class=\"section\"\u003e\n          \u003cdiv class=\"summary-card\"\u003e\n            \u003ch3\u003e系统整理\u003c/h3\u003e\n            \u003cp\u003e${module.summary.replaceAll(\"小树\", name)}\u003c/p\u003e\n          \u003c/div\u003e\n        \u003c/section\u003e\n        \u003csection class=\"section\"\u003e\n          \u003cdiv class=\"soft-card\"\u003e\n            \u003ch3\u003e请确认一下\u003c/h3\u003e\n            \u003cp\u003e${module.confirm.replaceAll(\"小树\", name)}\u003c/p\u003e\n          \u003c/div\u003e\n        \u003c/section\u003e\n      `);\n\n      setActions([\n        {\n          label: state.moduleIndex === modules.length - 1 ? \"整理得对，生成孩子画像\" : \"整理得对，继续下一项\",\n          icon: \"check\",\n          onClick: nextAfterSummary\n        },\n        { label: \"我想改一下\", kind: \"secondary-button\", icon: \"edit\", onClick: renderModuleInput },\n        {\n          label: \"我再补一段\",\n          kind: \"quiet-button\",\n          icon: \"plus\",\n          onClick: () =\u003e {\n            const moduleText = state.moduleText[module.key] || \"\";\n            state.moduleText[module.key] = `${moduleText}\\n`;\n            renderModuleInput();\n          }\n        }\n      ]);\n    }\n\n    function nextAfterSummary() {\n      if (state.moduleIndex \u003c modules.length - 1) {\n        state.moduleIndex += 1;\n        renderModuleInput();\n      } else {\n        renderLoading();\n      }\n    }\n\n    function renderLoading() {\n      state.screen = \"loading\";\n      setHeader(\"正在生成孩子画像\", \"整理中\", 92);\n      setPage(`\n        \u003cdiv class=\"loading-wrap\"\u003e\n          \u003cdiv\u003e\n            \u003cdiv class=\"loader\" aria-hidden=\"true\"\u003e\u003c/div\u003e\n            \u003ch2\u003e正在把几段真实情况整理成初版画像\u003c/h2\u003e\n            \u003cp\u003e会先保留确定性比较高的线索，不把预演或推测直接写成结论。\u003c/p\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n      `);\n      setActions([]);\n      window.setTimeout(renderInitialProfile, 1200);\n    }\n\n    function renderInitialProfile() {\n      state.screen = \"profile\";\n      const name = profile.nickname || \"小树\";\n      setHeader(\"孩子画像初版\", \"已生成\", 100);\n      setPage(`\n        \u003carticle class=\"hero-card compact\"\u003e\n          \u003ch2 class=\"hero-title\"\u003e${escapeHTML(name)}的初版画像\u003c/h2\u003e\n          \u003cp class=\"hero-copy\"\u003e这是进入正式使用前的背景底稿，后续建议都会参考它。\u003c/p\u003e\n        \u003c/article\u003e\n        \u003csection class=\"profile-grid\"\u003e\n          \u003cdiv class=\"profile-block\"\u003e\n            \u003ch3\u003e当前最需要先看的地方\u003c/h3\u003e\n            \u003cul class=\"summary-list\"\u003e\n              \u003cli\u003e作业启动前更容易出现冲突。\u003c/li\u003e\n              \u003cli\u003e手机可能承担从休息切到学习前的缓冲功能。\u003c/li\u003e\n              \u003cli\u003e被站在旁边盯着、被评价时，防御会升高。\u003c/li\u003e\n            \u003c/ul\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"profile-block\"\u003e\n            \u003ch3\u003e后续分析会参考的背景\u003c/h3\u003e\n            \u003cul class=\"summary-list\"\u003e\n              \u003cli\u003e日常节奏：上学日和周末自由时间都不算宽松。\u003c/li\u003e\n              \u003cli\u003e作业流程：主要卡在开始前，而不是单纯效率问题。\u003c/li\u003e\n              \u003cli\u003e沟通方式：提醒和解释担心时，孩子容易先听成控制。\u003c/li\u003e\n              \u003cli\u003e家庭支持：学习推动集中在主要照护者身上，需要更稳定的协作方式。\u003c/li\u003e\n            \u003c/ul\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"profile-block\"\u003e\n            \u003ch3\u003e仍在观察中\u003c/h3\u003e\n            \u003cp\u003e这些判断来自正式使用前的自述背景，还不是定论。后续只有真实尝试和反馈，才会继续更新档案。\u003c/p\u003e\n          \u003c/div\u003e\n        \u003c/section\u003e\n      `);\n\n      setActions([\n        { label: \"进入首页\", icon: \"home\", onClick: enterMainApp }\n      ]);\n    }\n\n    function enterMainApp() {\n      window.parent.postMessage({ type: \"parenting-ai-flow-next\", from: \"collection\" }, \"*\");\n      return;\n      setHeader(\"进入正式使用\", \"完成\", 100);\n      setPage(`\n        \u003carticle class=\"hero-card compact\"\u003e\n          \u003ch2 class=\"hero-title\"\u003e前置信息采集已完成\u003c/h2\u003e\n          \u003cp class=\"hero-copy\"\u003e正式产品里，下一步会进入首页、沟通预演、任务或档案的正常使用流程。\u003c/p\u003e\n        \u003c/article\u003e\n        \u003csection class=\"section\"\u003e\n          \u003cdiv class=\"soft-card\"\u003e\n            \u003ch3\u003e流程终点\u003c/h3\u003e\n            \u003cp\u003e这版原型保留前置信息采集的完整闭环，视觉和动效已统一到参考高保真体系。\u003c/p\u003e\n          \u003c/div\u003e\n        \u003c/section\u003e\n      `);\n      setActions([{ label: \"重新查看画像初版\", icon: \"arrow\", onClick: renderInitialProfile }]);\n    }\n\n    renderIntro();\n  \u003c/script\u003e\n\u003c/body\u003e\n\u003c/html\u003e\n",
      "\u003c!doctype html\u003e\n\u003chtml lang=\"zh-CN\"\u003e\n\u003chead\u003e\n  \u003cmeta charset=\"utf-8\" /\u003e\n  \u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1, viewport-fit=cover\" /\u003e\n  \u003ctitle\u003eParenting AI App\u003c/title\u003e\n  \u003cstyle\u003e\n    :root {\n      --green: #9dcc75;\n      --green-deep: #6f9f56;\n      --green-soft: #f1f8df;\n      --mint: #eef7cf;\n      --butter: #f6edb4;\n      --butter-soft: #fbf7dc;\n      --purple: #d5c96e;\n      --purple-soft: #fbf6d9;\n      --ink: #202633;\n      --ink-soft: #6f7480;\n      --muted: #9ca0a8;\n      --card: rgba(255, 255, 247, 0.88);\n      --line: rgba(73, 91, 45, 0.08);\n      --shadow-card: 0 18px 46px rgba(31, 39, 51, 0.045);\n      --shadow-soft: none;\n      --radius-card: 28px;\n      --radius-row: 24px;\n      --radius-pill: 999px;\n      --safe-bottom: env(safe-area-inset-bottom, 0px);\n      --safe-top: env(safe-area-inset-top, 0px);\n      --keyboard-offset: 0px;\n    }\n\n    * {\n      box-sizing: border-box;\n    }\n\n    html,\n    body {\n      width: 100%;\n      height: 100%;\n      margin: 0;\n      overflow: hidden;\n      overscroll-behavior-x: none;\n      color: var(--ink);\n      background:\n        radial-gradient(circle at 75% 12%, rgba(171, 221, 108, 0.26), transparent 31%),\n        radial-gradient(circle at 12% 8%, rgba(247, 231, 143, 0.36), transparent 30%),\n        #f8f6e9;\n      font-family: -apple-system, BlinkMacSystemFont, \"SF Pro Display\", \"SF Pro Text\", \"PingFang SC\", \"Microsoft YaHei\", sans-serif;\n      font-size: 16px;\n      line-height: 1.5;\n      touch-action: pan-y;\n    }\n\n    body {\n      display: grid;\n      place-items: center;\n      padding: 0;\n    }\n\n    button,\n    input,\n    textarea {\n      font: inherit;\n    }\n\n    button {\n      border: 0;\n      cursor: pointer;\n      -webkit-tap-highlight-color: transparent;\n    }\n\n    svg {\n      display: block;\n    }\n\n    .app-safe-top {\n      height: 42px;\n      height: max(42px, var(--safe-top));\n      flex: 0 0 auto;\n    }\n\n    .app-shell {\n      width: min(100%, 430px);\n      max-width: 100vw;\n      height: 100dvh;\n      overflow: hidden;\n      overflow-x: hidden;\n      overscroll-behavior-x: none;\n      position: relative;\n      display: grid;\n      grid-template-rows: auto 1fr auto auto auto;\n      background:\n        radial-gradient(circle at 76% 12%, rgba(162, 216, 103, 0.34), transparent 31%),\n        radial-gradient(circle at 12% 22%, rgba(247, 233, 154, 0.42), transparent 30%),\n        radial-gradient(circle at 58% 52%, rgba(238, 247, 207, 0.72), transparent 38%),\n        linear-gradient(180deg, #fbfaec 0%, #f8f6e5 52%, #f6f4e6 100%);\n    }\n\n    .child-pill {\n      min-height: 44px;\n      border-radius: var(--radius-pill);\n      padding: 6px 13px 6px 7px;\n      display: inline-flex;\n      align-items: center;\n      gap: 9px;\n      background: rgba(255, 255, 255, 0.82);\n      color: var(--ink);\n      box-shadow: var(--shadow-soft);\n      border: 1px solid rgba(255, 255, 255, 0.8);\n      backdrop-filter: blur(18px);\n      -webkit-backdrop-filter: blur(18px);\n      font-size: 16px;\n      font-weight: 620;\n      white-space: nowrap;\n    }\n\n    .child-name {\n      max-width: 62px;\n      overflow: hidden;\n      text-overflow: ellipsis;\n    }\n\n    .avatar-face {\n      width: 32px;\n      height: 32px;\n      border-radius: 50%;\n      display: grid;\n      place-items: center;\n      background: linear-gradient(180deg, #fbf0b8, #dff0a9);\n      font-size: 21px;\n    }\n\n    .chevron {\n      width: 14px;\n      height: 14px;\n      flex: 0 0 auto;\n    }\n\n    .icon-button {\n      width: 44px;\n      height: 44px;\n      border-radius: 50%;\n      display: grid;\n      place-items: center;\n      color: var(--ink-soft);\n      background: rgba(255, 255, 255, 0.82);\n      box-shadow: var(--shadow-soft);\n      border: 0;\n      backdrop-filter: blur(18px);\n      -webkit-backdrop-filter: blur(18px);\n    }\n\n    .icon-button svg {\n      width: 22px;\n      height: 22px;\n      stroke-width: 2;\n    }\n\n    .page-stack {\n      min-height: 0;\n      overflow: hidden;\n      overflow-x: hidden;\n      overscroll-behavior-x: none;\n      position: relative;\n    }\n\n    .page {\n      height: 100%;\n      overflow-y: auto;\n      overflow-x: hidden;\n      overscroll-behavior-x: none;\n      touch-action: pan-y;\n      position: relative;\n      display: none;\n      padding: 10px 20px 18px;\n      scrollbar-width: none;\n    }\n\n    .page::-webkit-scrollbar {\n      display: none;\n    }\n\n    .page.active {\n      display: block;\n    }\n\n    .page.page-entering .hero-card,\n    .page.page-entering .section,\n    .page.page-entering .task-card,\n    .page.page-entering .profile-block,\n    .page.page-entering .profile-data-card,\n    .page.page-entering .flow-card,\n    .page.page-entering .feedback-panel,\n    .page.page-entering .scenario-card,\n    .page.page-entering .rehearsal-header {\n      animation: page-rise 320ms cubic-bezier(0.22, 1, 0.36, 1) both;\n    }\n\n    .page.page-entering .section:nth-of-type(2),\n    .page.page-entering .task-card:nth-child(2),\n    .page.page-entering .profile-data-card:nth-child(2),\n    .page.page-entering .profile-block:nth-child(2),\n    .page.page-entering .scenario-card:nth-child(2) {\n      animation-delay: 35ms;\n    }\n\n    .page.page-entering .section:nth-of-type(3),\n    .page.page-entering .task-card:nth-child(3),\n    .page.page-entering .profile-data-card:nth-child(3),\n    .page.page-entering .profile-block:nth-child(3),\n    .page.page-entering .scenario-card:nth-child(3) {\n      animation-delay: 70ms;\n    }\n\n    .page.page-entering .section:nth-of-type(4),\n    .page.page-entering .task-card:nth-child(4),\n    .page.page-entering .profile-data-card:nth-child(4),\n    .page.page-entering .profile-block:nth-child(4),\n
